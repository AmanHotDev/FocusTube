<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusTube - Channels Directory 🎓</title>
    <style>
        /* ================= 🎨 MODERN ARCHITECTURE DESIGN SYSTEM ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', 'Segoe UI', sans-serif; }
        
        :root {
            --bg-master: #ffffff;
            --bg-card: #f9f9f9;
            --text-main: #0f0f0f;
            --text-muted: #606060;
            --border-color: #e5e5e5;
            --yt-blue: #065fd4;
            --tab-active-border: #0f0f0f;
            --banner-gradient: linear-gradient(135deg, #065fd4 0%, #1a1a1a 100%);
        }

        body.dark-mode {
            --bg-master: #0f0f0f;
            --bg-card: #1f1f1f;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #303030;
            --tab-active-border: #ffffff;
            --banner-gradient: linear-gradient(135deg, #0f0f0f 0%, #2d2d2d 100%);
        }

        body { background-color: var(--bg-master); color: var(--text-main); transition: background 0.2s, color 0.2s; padding: 24px; min-height: 100vh; }

        /* 🗂️ SECTION 1: PREMIUM CHANNELS DIRECTORY GRID */
        .directory-view { display: block; }
        .directory-heading { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }
        .directory-subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 24px; }
        
        .channels-master-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; }
        .channel-directory-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 24px; text-align: center; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; display: flex; flex-direction: column; align-items: center; gap: 14px; }
        .channel-directory-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.06); border-color: var(--yt-blue); }
        
        .card-avatar { width: 80px; height: 80px; border-radius: 50%; background: #272727; color: white; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; border: 2px solid var(--border-color); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card-title { font-size: 1.15rem; font-weight: 700; color: var(--text-main); }
        .card-badge { font-size: 0.75rem; font-weight: 600; background: var(--yt-blue); color: white; padding: 4px 12px; border-radius: 20px; }

        /* 🏛️ SECTION 2: DYNAMIC ACTIVE CHANNEL LOOK (HIDDEN BY DEFAULT) */
        .channel-profile-view { display: none; }
        .back-to-directory-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-bottom: 20px; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        .back-to-directory-btn:hover { background: var(--bg-card); }

        .channel-banner { width: 100%; height: 160px; background-image: var(--banner-gradient); border-radius: 16px; margin-bottom: 20px; }
        .channel-info-header { display: flex; gap: 24px; padding: 0 16px 24px 16px; align-items: center; border-bottom: 1px solid var(--border-color); }
        .channel-avatar-big { width: 90px; height: 90px; border-radius: 50%; background: #272727; color: white; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; border: 3px solid var(--border-color); flex-shrink: 0; }
        .channel-meta-text { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .channel-master-title { font-size: 1.8rem; font-weight: 700; }
        .channel-sub-count { font-size: 0.9rem; color: var(--text-muted); font-weight: 500; }

        /* 🗂️ TWO-TAB LAYOUT */
        .channel-navigation-tabs { display: flex; gap: 32px; padding: 0 16px; border-bottom: 1px solid var(--border-color); margin-top: 10px; }
        .yt-tab-link { background: transparent; border: none; color: var(--text-muted); font-size: 1rem; font-weight: 600; padding: 14px 4px; cursor: pointer; position: relative; }
        .yt-tab-link.active { color: var(--text-main); }
        .yt-tab-link.active::after { content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--tab-active-border); border-radius: 3px 3px 0 0; }

        .tab-content-panel { padding: 24px 16px; display: none; }
        .tab-content-panel.active { display: block; }
        
        .videos-matrix-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .yt-video-card { display: flex; flex-direction: column; gap: 10px; cursor: pointer; }
        .thumb-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
        .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .playlist-side-badge { position: absolute; right: 0; top: 0; bottom: 0; width: 35%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 0.85rem; border-radius: 0 12px 12px 0; }

        .v-title { font-size: 0.9rem; font-weight: 600; line-height: 1.4; color: var(--text-main); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .v-subtitle { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; }
        .pulse-placeholder { text-align: center; padding: 40px; color: var(--text-muted); font-size: 0.95rem; }
    </style>
</head>
<body>

    <!-- 🗂️ VIEW 1: PREMIUM CHANNELS DIRECTORY (MAIN PAGE LANDING) -->
    <div class="directory-view" id="directoryViewSectionUI">
        <h2 class="directory-heading">Approved Study Channels</h2>
        <p class="directory-subtitle">Select a dedicated teacher classroom node to explore lectures.</p>
        
        <div class="channels-master-grid" id="directoryGridNode">
            <!-- Firestore Channels List Inject Dynamically -->
        </div>
    </div>

    <!-- 🏛️ VIEW 2: DYNAMIC TEACHER INSIDE LAYOUT (OPENED ONLY UPON CARD CLICK) -->
    <div class="channel-profile-view" id="activeProfileViewSectionUI">
        <button class="back-to-directory-btn" onclick="returnToDirectoryDashboard()">← Back to All Channels</button>
        
        <div class="channel-banner"></div>

        <div class="channel-info-header">
            <div class="channel-avatar-big" id="channelAvatarNode">T</div>
            <div class="channel-meta-text">
                <h2 class="channel-master-title" id="channelTitleNode">Teacher</h2>
                <p class="channel-sub-count" id="channelSubCountNode">@tutor • Verified Classroom Channel</p>
            </div>
        </div>

        <div class="channel-navigation-tabs">
            <button class="yt-tab-link active" onclick="switchChannelTabMatrix(this, 'homeTabPanelUI')">Home</button>
            <button class="yt-tab-link" onclick="switchChannelTabMatrix(this, 'playlistsTabPanelUI')">Playlists</button>
        </div>

        <div class="tab-content-panel active" id="homeTabPanelUI">
            <div class="videos-matrix-grid" id="channelVideosGridNode"></div>
        </div>

        <div class="tab-content-panel" id="playlistsTabPanelUI">
            <div class="videos-matrix-grid" id="channelPlaylistsGridNode"></div>
        </div>
    </div>

    <!-- 🧠 FIREBASE ARCHITECTURE PACKETS -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBUvLFPdm2BmfwfTTYJPM2Cb02OOHPtH9M",
            authDomain: "focustube-72084.firebaseapp.com",
            projectId: "focustube-72084",
            storageBucket: "focustube-72084.firebasestorage.app",
            messagingSenderId: "988104840416",
            appId: "1:988104840416:web:d18dcb90b0c71da53b6c85"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const YT_KEYS_ARRAY = [
            "AIzaSyD-OjMXfyPMl5QOYj86FwdapQCQeNDrtiQ",
            "AIzaSyCBjjJGtUQIfKb8xfADxukJSqeWpI4mFqo",
            "AIzaSyClGb2Hgc9jIBIiHEbJWjOXkCRQB8zHOdw",
            "AIzaSyCIt6Ffw30No8gS7zZcDrtuVAXNkAZEq1s"
        ];
        let currentKeyIndex = 0;

        let globalDatamatrixCache = [];
        let selectedTeacherNode = "";

        // ================= 🏠 LOAD CHANNELS DIRECTORY FIRST =================
        function loadLiveChannelsDirectory() {
            db.collection("pinned_channels").onSnapshot(snapshot => {
                globalDatamatrixCache = [];
                let distinctSubjects = new Set();

                // डिफ़ॉल्ट रूप से पोर्टफोलियो के लिए "Target Board" को हमेशा लिस्ट में रखें
                distinctSubjects.add("Target Board");

                snapshot.forEach(doc => {
                    const data = doc.data();
                    globalDatamatrixCache.push(data);
                    if(data.subject) distinctSubjects.add(data.subject);
                });

                renderDirectoryGridCards(Array.from(distinctSubjects));
            });
        }

        // ================= 👥 RENDER DIRECTORY CARDS =================
        function renderDirectoryGridCards(channelsList) {
            const grid = document.getElementById('directoryGridNode');
            grid.innerHTML = "";

            channelsList.forEach(channel => {
                const card = document.createElement('div');
                card.className = "channel-directory-card";
                card.onclick = () => launchTeacherWorkspace(channel);

                card.innerHTML = `
                    <div class="card-avatar">${channel.charAt(0).toUpperCase()}</div>
                    <div class="card-title">${channel}</div>
                    <div class="card-badge">Open Channel</div>
                `;
                grid.appendChild(card);
            });
        }

        // ================= 🎯 OPEN TEACHER LOOK BACKEND =================
        function launchTeacherWorkspace(channelName) {
            selectedTeacherNode = channelName;

            // व्यूज को आपस में स्वैप करें
            document.getElementById('directoryViewSectionUI').style.display = "none";
            document.getElementById('activeProfileViewSectionUI').style.display = "block";

            // हेडर डिटेल्स इंजेक्ट करें
            document.getElementById('channelTitleNode').innerText = channelName;
            document.getElementById('channelAvatarNode').innerText = channelName.charAt(0).toUpperCase();
            document.getElementById('channelSubCountNode').innerText = `@${channelName.toLowerCase().replace(/\s+/g, '')} • Verified Educator Node`;

            fetchActiveChannelContent();
        }

        function returnToDirectoryDashboard() {
            document.getElementById('activeProfileViewSectionUI').style.display = "none";
            document.getElementById('directoryViewSectionUI').style.display = "block";
        }

        // ================= 📡 EXTRACT YOUTUBE LEADS WITH 4 KEYS =================
        async function fetchActiveChannelContent() {
            const homeGrid = document.getElementById('channelVideosGridNode');
            const playlistGrid = document.getElementById('channelPlaylistsGridNode');

            homeGrid.innerHTML = `<div class="pulse-placeholder">Extracting video logs...</div>`;
            playlistGrid.innerHTML = `<div class="pulse-placeholder">Building playlist cards...</div>`;

            let targetedPlaylists = globalDatamatrixCache.filter(item => {
                return item.subject && item.subject.toLowerCase() === selectedTeacherNode.toLowerCase();
            });

            if(selectedTeacherNode === "Target Board" || targetedPlaylists.length === 0) {
                targetedPlaylists = [{
                    playlistId: "PLe8_-h7emkLLkWqQBBKk6b8aLesC6UxMF",
                    title: "2025 परीक्षा के लिए महत्पूर्ण प्रश्न",
                    subject: "Target Board"
                }];
            }

            let compiledVideos = [];

            for (let item of targetedPlaylists) {
                let nextPageToken = "";
                let keepFetching = true;
                let playlistFirstVideoId = "";

                while (keepFetching) {
                    let activeKey = YT_KEYS_ARRAY[currentKeyIndex];
                    let apiUrl = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=8&playlistId=${item.playlistId}&key=${activeKey}`;
                    
                    if (nextPageToken) apiUrl += `&pageToken=${nextPageToken}`;

                    try {
                        let res = await fetch(apiUrl);
                        if (!res.ok) {
                            currentKeyIndex = (currentKeyIndex + 1) % YT_KEYS_ARRAY.length;
                            continue;
                        }

                        let data = await res.json();
                        if (data && data.items) {
                            data.items.forEach((video, idx) => {
                                const vId = video.snippet.resourceId ? video.snippet.resourceId.videoId : "";
                                if(idx === 0 && vId) playlistFirstVideoId = vId;

                                compiledVideos.push({
                                    videoId: vId,
                                    title: video.snippet.title,
                                    playlistId: item.playlistId
                                });
                            });
                        }

                        if (data && data.nextPageToken) {
                            nextPageToken = data.nextPageToken;
                        } else {
                            keepFetching = false;
                        }
                    } catch (err) {
                        keepFetching = false;
                    }
                }
                item.thumbnailId = playlistFirstVideoId || "H4Uj3tHGqoM";
            }

            renderHomeVideos(compiledVideos);
            renderPlaylistFolders(targetedPlaylists);
        }

        function renderHomeVideos(videosList) {
            const container = document.getElementById('channelVideosGridNode');
            if(videosList.length === 0) {
                container.innerHTML = `<div class="pulse-placeholder">No active lecture videos found.</div>`;
                return;
            }
            container.innerHTML = "";

            videosList.forEach(v => {
                if(!v.videoId) return;
                const card = document.createElement('div');
                card.className = "yt-video-card";
                card.onclick = () => window.location.href = `videoplay.html?v=${v.videoId}&list=${v.playlistId}`;

                card.innerHTML = `
                    <div class="thumb-wrapper">
                        <img src="https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg" alt="Thumbnail">
                    </div>
                    <div class="meta-row">
                        <h4 class="v-title">${v.title}</h4>
                        <p class="v-subtitle">${selectedTeacherNode} Classroom</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderPlaylistFolders(playlistsList) {
            const container = document.getElementById('channelPlaylistsGridNode');
            container.innerHTML = "";

            playlistsList.forEach(p => {
                const card = document.createElement('div');
                card.className = "yt-video-card";
                card.onclick = () => window.location.href = `videoplay.html?list=${p.playlistId}&v=${p.playlistId}`;

                card.innerHTML = `
                    <div class="thumb-wrapper">
                        <img src="https://img.youtube.com/vi/${p.thumbnailId}/mqdefault.jpg" alt="Thumbnail">
                        <div class="playlist-side-badge">
                            <span>☰</span>
                            <span style="font-size:0.7rem; font-weight:normal; margin-top:2px;">PLAYLIST</span>
                        </div>
                    </div>
                    <div class="meta-row">
                        <h4 class="v-title">${p.title}</h4>
                        <p class="v-subtitle">Full Course Module</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function switchChannelTabMatrix(btn, targetPanelId) {
            document.querySelectorAll('.yt-tab-link').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content-panel').forEach(p => p.classList.remove('active'));

            btn.classList.add('active');
            document.getElementById(targetPanelId).classList.add('active');
        }

        window.addEventListener('message', function(event) {
            const messagePacket = event.data;
            if (messagePacket.type === 'theme') {
                if (messagePacket.mode === 'dark') {
                    document.body.classList.add('dark-mode');
                } else {
                    document.body.classList.remove('dark-mode');
                }
            }
        });

        window.addEventListener('DOMContentLoaded', loadLiveChannelsDirectory);
    </script>
</body>
</html>
