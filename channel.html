<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusTube - Teacher Classrooms 🎓</title>
    <style>
        /* ================= 🎨 MODERN YOUTUBE THEME DESIGN ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', 'Segoe UI', sans-serif; }
        
        :root {
            --bg-channel: #ffffff;
            --bg-card: #f9f9f9;
            --text-main: #0f0f0f;
            --text-muted: #606060;
            --border-color: #e5e5e5;
            --yt-blue: #065fd4;
            --tab-active-border: #0f0f0f;
            --banner-bg: #e0e0e0;
            --teacher-active: #065fd4;
        }

        /* 🌙 DASHBOARD SYNC: TRUE DARK MODE */
        body.dark-mode {
            --bg-channel: #0f0f0f;
            --bg-card: #1f1f1f;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #303030;
            --tab-active-border: #ffffff;
            --banner-bg: #2d2d2d;
            --teacher-active: #ffffff;
        }

        body { background-color: var(--bg-channel); color: var(--text-main); transition: background 0.2s, color 0.2s; padding-bottom: 50px; }

        /* 👥 ALL TEACHERS SELECTION DIRECTORY */
        .teachers-directory-wrapper { padding: 24px 32px 12px 32px; border-bottom: 1px solid var(--border-color); }
        .directory-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; color: var(--text-main); }
        .teachers-flex-grid { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; }
        .teachers-flex-grid::-webkit-scrollbar { display: none; }
        
        .teacher-select-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 50px; padding: 8px 20px; display: flex; align-items: center; gap: 10px; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
        .teacher-select-card:hover { border-color: var(--yt-blue); }
        .teacher-select-card.active { background: var(--yt-blue); border-color: var(--yt-blue); color: white; }
        .teacher-mini-avatar { width: 28px; height: 28px; border-radius: 50%; background: #333; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; }
        .teacher-select-card.active .teacher-mini-avatar { background: white; color: var(--yt-blue); }

        /* 🖼️ PREMIUM CHANNEL HEADER & BANNER */
        .channel-profile-deck { display: none; } /* सिलेक्ट करने पर ही खुलेगा */
        .channel-banner { width: 100%; height: 140px; background-image: linear-gradient(135deg, #065fd4 0%, #cc0000 100%); opacity: 0.85; }
        
        .channel-info-header { display: flex; gap: 24px; padding: 24px 32px; align-items: center; border-bottom: 1px solid var(--border-color); }
        .channel-avatar-big { width: 80px; height: 80px; border-radius: 50%; background: #272727; color: white; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: bold; border: 2px solid var(--border-color); flex-shrink: 0; }
        .channel-meta-text { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .channel-master-title { font-size: 1.6rem; font-weight: 700; }
        .channel-sub-count { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
        .channel-description { font-size: 0.88rem; color: var(--text-muted); line-height: 1.4; max-width: 600px; }

        /* 🗂️ YT STYLE TWO-TAB NAVIGATION BAR */
        .channel-navigation-tabs { display: flex; gap: 32px; padding: 0 32px; border-bottom: 1px solid var(--border-color); background: var(--bg-channel); position: sticky; top: 0; z-index: 100; }
        .yt-tab-link { background: transparent; border: none; color: var(--text-main); font-size: 1rem; font-weight: 600; padding: 14px 4px; cursor: pointer; position: relative; transition: color 0.1s; }
        .yt-tab-link.active { color: var(--text-main); }
        .yt-tab-link.active::after { content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--tab-active-border); border-radius: 3px 3px 0 0; }
        .yt-tab-link:not(.active) { color: var(--text-muted); }

        /* 📺 LAYOUT GRIDS FOR HOME & PLAYLISTS */
        .tab-content-panel { padding: 24px 32px; display: none; }
        .tab-content-panel.active { display: block; }
        
        .videos-matrix-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; row-gap: 32px; }
        .yt-video-card { display: flex; flex-direction: column; gap: 10px; cursor: pointer; }
        
        .thumb-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
        .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        
        .playlist-side-badge { position: absolute; right: 0; top: 0; bottom: 0; width: 35%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 0.85rem; border-radius: 0 12px 12px 0; }

        .meta-row { display: flex; flex-direction: column; gap: 4px; padding: 0 4px; }
        .v-title { font-size: 0.92rem; font-weight: 600; line-height: 1.4; color: var(--text-main); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .v-subtitle { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; }

        .pulse-placeholder { text-align: center; padding: 60px; color: var(--text-muted); font-size: 0.95rem; font-weight: 500; }

        @media (max-width: 600px) {
            .channel-info-header { flex-direction: column; text-align: center; padding: 20px; }
            .channel-navigation-tabs { justify-content: center; gap: 40px; }
            .tab-content-panel { padding: 16px; }
        }
    </style>
</head>
<body>

    <!-- 👥 SCREEN 1: MASTER TEACHERS DIRECTORY HORIZONTAL SLIDER -->
    <div class="teachers-directory-wrapper">
        <div class="directory-title">🎓 Select Study Classroom Channel:</div>
        <div class="teachers-flex-grid" id="teachersMasterGridShell">
            <!-- डायनामिक चैनल लिस्टिंग लोड होगी -->
        </div>
    </div>

    <!-- 📢 ONBOARDING SCREEN DEFAULT STATE -->
    <div id="onboardingPromptUI" class="pulse-placeholder" style="padding: 100px 20px;">
        ✨ Please select a teacher channel from the slider dashboard above to open classes.
    </div>

    <!-- 🏛️ SCREEN 2: ACTIVE SELECTED PROFILE CONTAINER DECK -->
    <div class="channel-profile-deck" id="activeProfileContainerUI">
        <!-- BANNER LAYER -->
        <div class="channel-banner"></div>

        <!-- BRANDING HEADER -->
        <div class="channel-info-header">
            <div class="channel-avatar-big" id="channelAvatarNode">FT</div>
            <div class="channel-meta-text">
                <h2 class="channel-master-title" id="channelTitleNode">Teacher</h2>
                <p class="channel-sub-count" id="channelSubCountNode">@tutor • Verified Classroom</p>
                <p class="channel-description" id="channelDescNode">FocusTube distracted-free education deck.</p>
            </div>
        </div>

        <!-- TWO-TAB YT LINK SWITCHER -->
        <div class="channel-navigation-tabs">
            <button class="yt-tab-link active" onclick="switchChannelTabMatrix(this, 'homeTabPanelUI')">Home</button>
            <button class="yt-tab-link" onclick="switchChannelTabMatrix(this, 'playlistsTabPanelUI')">Playlists</button>
        </div>

        <!-- TAB 1: VIDEOS -->
        <div class="tab-content-panel active" id="homeTabPanelUI">
            <div class="videos-matrix-grid" id="channelVideosGridNode"></div>
        </div>

        <!-- TAB 2: PLAYLISTS -->
        <div class="tab-content-panel" id="playlistsTabPanelUI">
            <div class="videos-matrix-grid" id="channelPlaylistsGridNode"></div>
        </div>
    </div>

    <!-- 🧠 FIREBASE ARCHITECTURE PACKETS -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // 🎯 FIREBASE PROJECT INSTANCE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBUvLFPdm2BmfwfTTYJPM2Cb02OOHPtH9M",
            authDomain: "focustube-72084.firebaseapp.com",
            projectId: "focustube-72084",
            storageBucket: "focustube-72084.firebasestorage.app",
            messagingSenderId: "988104840416",
            appId: "1:988104840416:web:d18dcb90b0c71da53b6c85"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 🔑 🔥 4x4 API KEYS POOL
        const YT_KEYS_ARRAY = [
            "AIzaSyD-OjMXfyPMl5QOYj86FwdapQCQeNDrtiQ",
            "AIzaSyCBjjJGtUQIfKb8xfADxukJSqeWpI4mFqo",
            "AIzaSyClGb2Hgc9jIBIiHEbJWjOXkCRQB8zHOdw",
            "AIzaSyCIt6Ffw30No8gS7zZcDrtuVAXNkAZEq1s"
        ];
        let currentKeyIndex = 0;

        let globalDatamatrixCache = [];
        let currentlySelectedTeacher = "";

        // ================= 🏠 FIRESTORE SYNC & TEACHERS EXTRACTION =================
        function initiateLiveDirectorySync() {
            db.collection("pinned_channels").onSnapshot(snapshot => {
                globalDatamatrixCache = [];
                let localChannelsSet = new Set();

                // हमेशा बैकअप सेफ्टी के लिए टारगेट बोर्ड (Hindi) को फ़ीड में रखो ही
                localChannelsSet.add("Target Board");
                
                snapshot.forEach(doc => {
                    const d = doc.data();
                    globalDatamatrixCache.push(d);
                    
                    // अगर कोर्स में चैनल/टीचर का नाम या सब्जेक्ट है तो सेट में जोड़ो
                    if(d.subject) localChannelsSet.add(d.subject);
                });

                // टीचर्स का ऊपर वाला गोल बटन्स बार बिल्ड करो
                buildTeachersSliderBar(Array.from(localChannelsSet));
            });
        }

        // ================= 👥 BUILD HORIZONTAL SELECTION SLIDER =================
        function buildTeachersSliderBar(teachersList) {
            const sliderShell = document.getElementById('teachersMasterGridShell');
            sliderShell.innerHTML = "";

            teachersList.forEach(teacher => {
                const initial = teacher.charAt(0).toUpperCase();
                const card = document.createElement('div');
                card.className = "teacher-select-card";
                card.id = `btn-${teacher.replace(/\s+/g, '')}`;
                card.onclick = () => selectAndLaunchTeacherChannelDeck(teacher, card);

                card.innerHTML = `
                    <div class="teacher-mini-avatar">${initial}</div>
                    <span style="font-size:0.9rem; font-weight:600;">${teacher}</span>
                `;
                sliderShell.appendChild(card);
            });
        }

        // ================= 🎯 ACTION: SELECT A TEACHER CHANNEL =================
        function selectAndLaunchTeacherChannelDeck(teacherName, clickedElement) {
            currentlySelectedTeacher = teacherName;

            // एक्टिव क्लास सीएसएस टॉगल करो
            document.querySelectorAll('.teacher-select-card').forEach(c => c.classList.remove('active'));
            clickedElement.classList.add('active');

            // ऑनबोर्डिंग संकेत छुपाकर मुख्य लेआउट खोलो
            document.getElementById('onboardingPromptUI').style.display = "none";
            document.getElementById('activeProfileContainerUI').style.display = "block";

            // प्रोफाइल डेटा इंजेक्ट करो
            document.getElementById('channelTitleNode').innerText = teacherName;
            document.getElementById('channelAvatarNode').innerText = teacherName.charAt(0).toUpperCase();
            document.getElementById('channelSubCountNode').innerText = `@${teacherName.toLowerCase().replace(/\s+/g, '')} • Verified Subject Instructor`;
            document.getElementById('channelDescNode').innerText = `Official Whitelisted Classroom Repository for ${teacherName}. Safe workspace compiled with strict focus-mode settings.`;

            // इस खास टीचर की प्लेलिस्ट्स को फ़िल्टर करके यूट्यूब माइनिंग शुरू करो
            fetchSpecificTeacherContent();
        }

        // ================= 📡 FILTER PLAYLISTS & ATTAIN YT LEADS =================
        async function fetchSpecificTeacherContent() {
            const homeGrid = document.getElementById('channelVideosGridNode');
            const playlistGrid = document.getElementById('channelPlaylistsGridNode');

            homeGrid.innerHTML = `<div class="pulse-placeholder">Mining individual lectures...</div>`;
            playlistGrid.innerHTML = `<div class="pulse-placeholder">Compiling catalogs...</div>`;

            // फ़िल्टर करो कि डेटाबेस में इस टीचर (Subject) की कौन सी प्लेलिस्ट्स हैं
            let targetedPlaylists = globalDatamatrixCache.filter(item => {
                return item.subject && item.subject.toLowerCase() === currentlySelectedTeacher.toLowerCase();
            });

            // स्पेशल फॉलबैक: अगर टारगेट बोर्ड सिलेक्टेड है और डेटाबेस खाली है, तो डिफ़ॉल्ट हिंदी प्लेलिस्ट लोड करो
            if(currentlySelectedTeacher === "Target Board" || targetedPlaylists.length === 0) {
                targetedPlaylists = [{
                    playlistId: "PLe8_-h7emkLLkWqQBBKk6b8aLesC6UxMF",
                    title: "2025 परीक्षा के लिए महत्पूर्ण प्रश्न",
                    subject: "Target Board"
                }];
            }

            let compiledVideos = [];

            for (let item of targetedPlaylists) {
                let nextPageToken = "";
                let keepFetching = true;
                let playlistFirstVideoId = "";

                while (keepFetching) {
                    let activeKey = YT_KEYS_ARRAY[currentKeyIndex];
                    let apiUrl = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=10&playlistId=${item.playlistId}&key=${activeKey}`;
                    
                    if (nextPageToken) apiUrl += `&pageToken=${nextPageToken}`;

                    try {
                        let res = await fetch(apiUrl);
                        if (!res.ok) {
                            currentKeyIndex = (currentKeyIndex + 1) % YT_KEYS_ARRAY.length;
                            continue;
                        }

                        let data = await res.json();
                        if (data && data.items) {
                            data.items.forEach((video, idx) => {
                                const vId = video.snippet.resourceId ? video.snippet.resourceId.videoId : "";
                                if(idx === 0 && vId) playlistFirstVideoId = vId;

                                compiledVideos.push({
                                    videoId: vId,
                                    title: video.snippet.title,
                                    playlistId: item.playlistId
                                });
                            });
                        }

                        if (data && data.nextPageToken) {
                            nextPageToken = data.nextPageToken;
                        } else {
                            keepFetching = false;
                        }
                    } catch (err) {
                        keepFetching = false;
                    }
                }
                item.thumbnailId = playlistFirstVideoId || "H4Uj3tHGqoM";
            }

            // यूआई स्क्रीन रेंडर करें
            renderHomeTabVideos(compiledVideos);
            renderPlaylistTabFolders(targetedPlaylists);
        }

        // ================= 🔀 DYNAMIC RENDER ENGINES =================
        function renderHomeTabVideos(videosList) {
            const container = document.getElementById('channelVideosGridNode');
            if(videosList.length === 0) {
                container.innerHTML = `<div class="pulse-placeholder">No active video materials found.</div>`;
                return;
            }
            container.innerHTML = "";

            videosList.forEach(v => {
                if(!v.videoId) return;
                const card = document.createElement('div');
                card.className = "yt-video-card";
                card.onclick = () => window.location.href = `videoplay.html?v=${v.videoId}&list=${v.playlistId}`;

                card.innerHTML = `
                    <div class="thumb-wrapper">
                        <img src="https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg" alt="Thumbnail">
                    </div>
                    <div class="meta-row">
                        <h4 class="v-title">${v.title}</h4>
                        <p class="v-subtitle">${currentlySelectedTeacher} Classroom</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderPlaylistTabFolders(playlistsList) {
            const container = document.getElementById('channelPlaylistsGridNode');
            container.innerHTML = "";

            playlistsList.forEach(p => {
                const card = document.createElement('div');
                card.className = "yt-video-card";
                card.onclick = () => window.location.href = `videoplay.html?list=${p.playlistId}&v=${p.playlistId}`;

                card.innerHTML = `
                    <div class="thumb-wrapper">
                        <img src="https://img.youtube.com/vi/${p.thumbnailId}/mqdefault.jpg" alt="Thumbnail">
                        <div class="playlist-side-badge">
                            <span>☰</span>
                            <span style="font-size:0.7rem; font-weight:normal; margin-top:2px;">PLAYLIST</span>
                        </div>
                    </div>
                    <div class="meta-row">
                        <h4 class="v-title">${p.title}</h4>
                        <p class="v-subtitle">Full Course Module</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // ================= 🎛️ TAB SWITCHER =================
        function switchChannelTabMatrix(btn, targetPanelId) {
            document.querySelectorAll('.yt-tab-link').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content-panel').forEach(p => p.classList.remove('active'));

            btn.classList.add('active');
            document.getElementById(targetPanelId).classList.add('active');
        }

        // ================= 📡 PARENT DASHBOARD THEME SIGNAL RECEIVER =================
        window.addEventListener('message', function(event) {
            const messagePacket = event.data;
            if (messagePacket.type === 'theme') {
                if (messagePacket.mode === 'dark') {
                    document.body.classList.add('dark-mode');
                } else {
                    document.body.classList.remove('dark-mode');
                }
            }
        });

        // Initialize Core Node on Load
        window.addEventListener('DOMContentLoaded', initiateLiveDirectorySync);
    </script>
</body>
</html>
