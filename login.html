<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FocusTube | Gateway Portal 🔒</title>
    <style>
        /* ================= 🎨 BRAND IDENTITY CORE (YOUTUBE RED & WHITE) ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        :root {
            --yt-red: #ff0000;
            --yt-dark-red: #cc0000;
            --pure-white: #ffffff;
            --bg-light: #f9f9f9;
            --text-dark: #0f0f0f;
            --text-muted: #606060;
            --border-color: #e5e5e5;
            --card-shadow: rgba(0, 0, 0, 0.08);
            --particle-color: rgba(255, 0, 0, 0.15);
        }

        /* 🌙 CHILD NODE STUDENT DARK MODE (INDEX THEME SYNC) */
        body.student-dark-mode {
            --bg-light: #0f0f0f;
            --text-dark: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #272727;
            --card-shadow: rgba(0, 0, 0, 0.5);
            --particle-color: rgba(255, 255, 255, 0.05);
            background-color: #0f0f0f;
        }

        body { background-color: var(--bg-light); color: var(--text-dark); transition: background 0.4s, color 0.4s; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; padding: 20px; }

        /* 🌌 TECH BACKGROUND GRAPHICS GRID WITH FLOATING SPECK FIELD */
        body::before {
            content: ""; position: absolute; inset: 0;
            background-image: linear-gradient(var(--border-color) 1px, transparent 1px), linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 40px 40px; background-position: center;
            opacity: 0.3; pointer-events: none; z-index: 1;
        }

        /* FLOATING BACKGROUND TECH PARTICLES */
        .tech-bg-particle { position: absolute; background: var(--particle-color); border-radius: 50%; pointer-events: none; z-index: 2; animation: floatUpward 6s infinite linear; }
        @keyframes floatUpward {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* 🔒 ULTRA-PREMIUM CENTRAlIZED LOGIN HUB CARD */
        .login-card { background: var(--pure-white); border: 1px solid var(--border-color); border-radius: 24px; padding: 50px 30px 40px 30px; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 15px 35px var(--card-shadow); z-index: 10; position: relative; transition: background 0.4s, border-color 0.4s; backdrop-filter: blur(10px); }
        body.student-dark-mode .login-card { background: #1f1f1f; }

        /* 🔙 PREMIUM BACK BUTTON STYLING */
        .btn-back-home { position: absolute; top: 20px; left: 24px; text-decoration: none; color: var(--text-dark); font-size: 1.3rem; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; background: transparent; border: 1px solid transparent; }
        .btn-back-home:hover { color: var(--yt-red); background: rgba(255, 0, 0, 0.05); border-color: rgba(255, 0, 0, 0.1); transform: scale(1.05); }

        /* 🤖 WALKING MASCOT CONTAINER INSIDE CARD */
        .mascot-viewport-container { position: relative; width: 100%; height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; margin-bottom: 20px; }
        
        .mascot-head-capsule { width: 110px; height: 110px; position: relative; z-index: 10; transform-origin: bottom center; animation: headFloatBreathing 3s ease-in-out infinite alternate; }
        @keyframes headFloatBreathing { 0% { transform: translateY(0) rotate(0deg); } 100% { transform: translateY(-8px) rotate(1deg); } }
        .logo-image-node { width: 100%; height: 100%; object-fit: contain; }

        /* KINETIC WALKING MECHANICAL LEGS GRID */
        .mechanical-legs-dock { display: flex; justify-content: space-between; width: 64px; height: 50px; position: absolute; top: 100px; z-index: 5; pointer-events: none; }
        .cyber-leg { width: 10px; height: 50px; background: #1e1e1e; border-radius: 4px; position: relative; transform-origin: top center; animation: inverseLegWalk 1s infinite linear; border: 1px solid rgba(255,255,255,0.05); }
        body.student-dark-mode .cyber-leg { background: #f9f9f9; }
        .cyber-leg.right-leg { animation-name: legWalk; animation-delay: 0.5s; }
        .cyber-leg::after { content: ""; position: absolute; bottom: -3px; left: -6px; width: 20px; height: 8px; background: var(--yt-red); border-radius: 4px 8px 3px 3px; }

        @keyframes legWalk {
            0% { transform: rotate(-22deg) translateY(0); }
            25% { transform: rotate(0deg) translateY(-6px); }
            50% { transform: rotate(22deg) translateY(0); }
            75% { transform: rotate(0deg) translateY(2px); }
            100% { transform: rotate(-22deg) translateY(0); }
        }
        @keyframes inverseLegWalk {
            0% { transform: rotate(22deg) translateY(0); }
            25% { transform: rotate(0deg) translateY(2px); }
            50% { transform: rotate(-22deg) translateY(-0); }
            75% { transform: rotate(0deg) translateY(-6px); }
            100% { transform: rotate(22deg) translateY(0); }
        }

        /* 🚀 TURBO SPRINT INTERCEPT TRIGGER (WHEN HOVERING LOGIN BUTTON) */
        body.turbo-sprint-active .cyber-leg { animation-duration: 0.3s; }
        body.turbo-sprint-active .ground-dirt-track { animation-duration: 0.15s; }

        /* MOVING GROUND TRACK SURFACE */
        .moving-ground-surface { width: 160px; height: 4px; background: var(--text-dark); border-radius: 2px; position: absolute; top: 148px; overflow: hidden; }
        body.student-dark-mode .moving-ground-surface { background: #ffffff; }
        .ground-dirt-track { width: 200%; height: 100%; background: linear-gradient(90deg, transparent 0%, var(--yt-red) 30%, transparent 60%, var(--yt-red) 80%, transparent 100%); background-size: 50% 100%; animation: surfaceStream 0.6s infinite linear; }
        @keyframes surfaceStream { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* CARD TYPOGRAPHY */
        .portal-title { font-size: 1.8rem; font-weight: 800; color: var(--text-dark); letter-spacing: -0.5px; }
        .portal-title span { color: var(--yt-red); }
        .portal-subtitle { font-size: 0.92rem; color: var(--text-muted); margin: 10px 0 30px 0; line-height: 1.5; }

        /* 🚪 GOOGLE AUTH PIPELINE CONNECTION TRIGGER BUTTON */
        .btn-google-login { display: flex; align-items: center; justify-content: center; gap: 12px; background: var(--pure-white); color: #000000; border: 1px solid #dadce0; padding: 14px 24px; border-radius: 12px; font-size: 0.98rem; font-weight: 700; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.02); transition: 0.2s; width: 100%; position: relative; overflow: hidden; }
        .btn-google-login:hover { background: #f8fafc; border-color: #b5b8bc; transform: translateY(-2px); box-shadow: 0 6px 18px rgba(255,0,0,0.1); }
        .google-icon-svg { width: 20px; height: 20px; }

        /* SECURITY FOOTER REMINDER */
        .security-lock-notice { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 0.78rem; color: var(--text-muted); margin-top: 25px; font-weight: 600; }
        .lock-icon { color: #34A353; font-size: 0.9rem; }

        /* EYE GUARD FLOATING TRIGGER */
        .btn-theme-toggle { position: absolute; top: 20px; right: 20px; background: var(--pure-white); border: 1px solid var(--border-color); padding: 8px 14px; border-radius: 20px; color: var(--text-dark); cursor: pointer; font-weight: 700; font-size: 0.8rem; z-index: 100; box-shadow: 0 4px 10px var(--card-shadow); }
        body.student-dark-mode .btn-theme-toggle { background: #212121; }
    </style>
</head>
<body>

    <!-- DYNAMIC SPECK BLOCKS (BACKGROUND FLOATING PARTICLES) -->
    <div class="tech-bg-particle" style="left: 15%; width: 8px; height: 8px; animation-delay: 0s; animation-duration: 7s;"></div>
    <div class="tech-bg-particle" style="left: 45%; width: 12px; height: 12px; animation-delay: 2s; animation-duration: 5s;"></div>
    <div class="tech-bg-particle" style="left: 75%; width: 6px; height: 6px; animation-delay: 4s; animation-duration: 9s;"></div>
    <div class="tech-bg-particle" style="left: 90%; width: 10px; height: 10px; animation-delay: 1s; animation-duration: 6s;"></div>

    <!-- EYE-GUARD INTERCEPT SWITCH BUTTON -->
    <button class="btn-theme-toggle" onclick="toggleStudentPreviewTheme()" id="themeBtnTxt">👁️ Eye Guard On</button>

    <div class="login-card">
        
        <!-- 🔙 BACK TO HOME ARROW LINK -->
        <a href="index.html" class="btn-back-home" title="Back to Home">←</a>
        
        <!-- 🤖 RUNNING MASCOT MECHANISM -->
        <div class="mascot-viewport-container">
            <div class="mascot-head-capsule">
                <img src="logo.png" alt="FocusTube Mascot Hub" class="logo-image-node">
            </div>
            <div class="mechanical-legs-dock">
                <div class="cyber-leg left-leg"></div>
                <div class="cyber-leg right-leg"></div>
            </div>
            <div class="moving-ground-surface">
                <div class="ground-dirt-track"></div>
            </div>
        </div>

        <!-- PORTAL TEXT CONTENT -->
        <h2 class="portal-title">Focus<span>Tube</span> Gateway</h2>
        <p class="portal-subtitle">Secure verification node. Please authorize your Google identity packet to establish dynamic streaming clearance.</p>

        <!-- 🚪 AUTH INTEGRATION LINK ACTION WITH TURBO ACTIVATORS -->
        <button class="btn-google-login" id="loginBtnTrigger" onclick="triggerGoogleAuthenticationCore()">
            <svg class="google-icon-svg" viewBox="0 0 24 24">
                <path fill="#EA4335" d="M12 5.04c1.64 0 3.12.56 4.28 1.67l3.2-3.2C17.52 1.58 14.96 1 12 1 7.35 1 3.39 3.66 1.41 7.55l3.82 2.96C6.18 7.37 8.87 5.04 12 5.04z"/>
                <path fill="#4285F4" d="M23.49 12.27c0-.81-.07-1.59-.2-2.36H12v4.51h6.46c-.29 1.48-1.14 2.73-2.42 3.57l3.77 2.92c2.2-2.03 3.48-5.02 3.48-8.64z"/>
                <path fill="#FBBC05" d="M5.23 14.51c-.24-.71-.38-1.47-.38-2.26s.14-1.55.38-2.26L1.41 7.03C.51 8.82 0 10.85 0 13s.51 4.18 1.41 5.97l3.82-2.97z"/>
                <path fill="#34A353" d="M12 23c3.24 0 5.97-1.07 7.96-2.92l-3.77-2.92c-1.11.75-2.53 1.21-4.19 1.21-3.13 0-5.82-2.33-6.77-5.47L1.41 15.87C3.39 19.76 7.35 23 12 23z"/>
            </svg>
            Continue with Gmail 🚀
        </button>

        <!-- SECURITY NOTICE -->
        <div class="security-lock-notice">
            <span class="lock-icon">🔒</span> Protected by Google Identity Firewalls
        </div>

    </div>

    <!-- 🧠 FIREBASE DATA ROUTING SYSTEMS (COMPAT v10 INFRASTRUCTURE) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        // 🎯 NEW RE-INITIALIZED FIREBASE APP CONFIG (focustube-72084)
        const firebaseConfig = {
            apiKey: "AIzaSyBUvLFPdm2BmfwfTTYJPM2Cb02OOHPtH9M",
            authDomain: "focustube-72084.firebaseapp.com",
            projectId: "focustube-72084",
            storageBucket: "focustube-72084.firebasestorage.app",
            messagingSenderId: "988104840416",
            appId: "1:988104840416:web:d18dcb90b0c71da53b6c85"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // 👁️ RE-CALIBRATING EYE GUARD ON THE FLY
        function toggleStudentPreviewTheme() {
            const body = document.body;
            const btn = document.getElementById('themeBtnTxt');
            body.classList.toggle('student-dark-mode');
            if(body.classList.contains('student-dark-mode')) {
                btn.innerText = "☀︎ Light Mode";
            } else {
                btn.innerText = "👁 Dark Mode";
            }
        }

        // ⚙️ TURBO SPRINT RUNNING LISTENER LOGIC
        const loginBtn = document.getElementById('loginBtnTrigger');
        loginBtn.addEventListener('mouseenter', () => { document.body.classList.add('turbo-sprint-active'); });
        loginBtn.addEventListener('mouseleave', () => { document.body.classList.remove('turbo-sprint-active'); });

        // 🚪 FIREBASE GOOGLE SIGN-IN INTERCEPT CORE
        function triggerGoogleAuthenticationCore() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then((result) => {
                    // .html extension integration added safely
                    window.location.href = "dashboard.html";
                })
                .catch((error) => {
                    alert("Authentication Error: " + error.message);
                });
        }

        // Route Guard LifeCycle Engine
        auth.onAuthStateChanged((user) => {
            if (user) { window.location.href = "dashboard.html"; }
        });
    </script>
</body>
</html>
