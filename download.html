<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusTube - Offline Downloads ⬇️</title>
    <style>
        /* ================= 🎨 PREMIUM YOUTUBE DOWNLOADS DESIGN SYSTEM ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', 'Segoe UI', sans-serif; }
        
        :root {
            --bg-master: #ffffff;
            --bg-card: #ffffff;
            --text-main: #0f0f0f;
            --text-muted: #606060;
            --border-color: #e5e5e5;
            --yt-blue: #065fd4;
            --hover-bg: #f2f2f2;
            --storage-bar-bg: #e0e0e0;
            --icon-invert: 0;
        }

        body.dark-mode {
            --bg-master: #0f0f0f;
            --bg-card: #0f0f0f;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #303030;
            --hover-bg: #272727;
            --storage-bar-bg: #333333;
            --icon-invert: 1;
        }

        body { background-color: var(--bg-master); color: var(--text-main); transition: background 0.2s, color 0.2s; padding: 24px 40px; min-height: 100vh; }
        .download-master-container { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }

        .page-heading { font-size: 1.6rem; font-weight: 700; }

        /* 📊 PREMIUM STORAGE ANALYTICS BAR */
        .storage-analytics-card { background: var(--hover-bg); border-radius: 16px; padding: 20px; border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 10px; }
        .storage-flex-meta { display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: 600; }
        .storage-progress-track { width: 100%; height: 8px; background: var(--storage-bar-bg); border-radius: 4px; overflow: hidden; }
        .storage-progress-fill { height: 100%; width: 24%; background: var(--yt-blue); border-radius: 4px; transition: width 0.3s; }
        body.dark-mode .storage-progress-fill { background: #3ea6ff; }

        /* 🔍 SEARCH WITHIN DOWNLOADS */
        .download-search-box { display: flex; align-items: center; border: 1px solid var(--border-color); background: var(--bg-card); padding: 10px 18px; border-radius: 24px; max-width: 500px; margin-top: 8px; }
        .download-search-box input { background: transparent; border: none; outline: none; color: var(--text-main); font-size: 0.95rem; flex: 1; }
        .download-search-box img { width: 16px; height: 16px; filter: invert(var(--icon-invert)); }

        /* 📺 DOWNLOADED LIST / GRIDS STYLE */
        .download-list-stack { display: flex; flex-direction: column; margin-top: 12px; }
        .download-video-row { display: flex; align-items: center; gap: 20px; padding: 16px 12px; border-bottom: 1px solid var(--border-color); cursor: pointer; position: relative; border-radius: 12px; transition: background 0.1s; }
        .download-video-row:hover { background: var(--hover-bg); }

        .row-thumb-shell { width: 160px; aspect-ratio: 16/9; background: #000; border-radius: 10px; overflow: hidden; flex-shrink: 0; position: relative; }
        .row-thumb-shell img { width: 100%; height: 100%; object-fit: cover; }
        
        /* लाइव डाउनलोडिंग या रेडी टू वॉच का छोटा लेबल */
        .offline-status-badge { position: absolute; bottom: 6px; right: 6px; background: rgba(0,0,0,0.8); color: #fff; font-size: 0.7rem; font-weight: 600; padding: 2px 6px; border-radius: 4px; }

        .row-meta-data { flex: 1; display: flex; flex-direction: column; gap: 6px; padding-right: 50px; }
        .v-title { font-size: 1rem; font-weight: 600; line-height: 1.4; color: var(--text-main); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .v-size { font-size: 0.82rem; color: var(--text-muted); font-weight: 500; display: flex; align-items: center; gap: 6px; }
        .v-size img { width: 12px; height: 12px; filter: invert(var(--icon-invert)); }

        /* डिलीट बटन */
        .delete-download-btn { position: absolute; right: 16px; background: transparent; border: none; cursor: pointer; padding: 8px; border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .delete-download-btn:hover { background: var(--border-color); }
        .delete-download-btn img { width: 16px; height: 16px; filter: invert(var(--icon-invert)); }

        /* ✨ EMPTY STATE UI CONTAINER */
        .empty-download-deck { text-align: center; padding: 100px 20px; color: var(--text-muted); display: none; flex-direction: column; align-items: center; gap: 14px; }
        .empty-download-deck img { width: 64px; height: 64px; filter: invert(var(--icon-invert)); opacity: 0.6; }
    </style>
</head>
<body>

    <div class="download-master-container">
        
        <h2 class="page-heading">Downloads Node ⬇️</h2>

        <!-- 📊 STORAGE DISK RECKONER -->
        <div class="storage-analytics-card">
            <div class="storage-flex-meta">
                <span>FocusTube Offline Storage Allocation</span>
                <span id="storageMetricsLabelNode">0 MB Used / 5.0 GB Max</span>
            </div>
            <div class="storage-progress-track">
                <div class="storage-progress-fill" id="storageBarFillNode" style="width: 0%;"></div>
            </div>
        </div>

        <!-- 🔍 INNER SEARCH ELEMENT -->
        <div class="download-search-box">
            <input type="text" id="downloadSearchInputNode" placeholder="Search downloaded video files" oninput="executeDownloadsSearch()">
            <img src="icons/path_to_search_icon.png" alt="Search">
        </div>

        <!-- 📺 OFFLINE ROWS CONTAINER -->
        <div class="download-list-stack" id="downloadRowsStackUI">
            <!-- लोकल स्टोरेज डेटा रो यहाँ जनरेट होगी -->
        </div>

        <!-- ✨ EMPTY STATE INTERFACE -->
        <div class="empty-download-deck" id="emptyDownloadPromptUI">
            <img src="icons/playlist.png" alt="No Downloads">
            <h4 style="color: var(--text-main); font-size: 1.1rem;">Videos you download appear here</h4>
            <p style="font-size: 0.88rem;">Approved classrooms can be indexed offline to study without active networks.</p>
        </div>

    </div>

    <script>
        const DOWNLOADS_STORAGE_KEY = "focustube_offline_downloads_vector";
        let localDownloadsArray = [];

        // ================= 🏠 INITIALIZE ENGINE & STORAGE ALLOCATION =================
        function initializeDownloadsEngine() {
            localDownloadsArray = JSON.parse(localStorage.getItem(DOWNLOADS_STORAGE_KEY)) || [];
            
            // अगर डेटा बिल्कुल खाली है तो पोर्टफोलियो के प्रदर्शन के लिए 2 मॉक डाउनलोडेड वीडियो खुद जोड़ दो
            if(localDownloadsArray.length === 0) {
                localDownloadsArray = [
                    { videoId: "PLe8_-h7emkLLkWqQBBKk6b8aLesC6UxMF", title: "[ 2025 परीक्षा ] महत्वपूर्ण वस्तुनिष्ठ प्रश्न | Hindi Class 12th", size: "142 MB", playlistId: "PLe8_-h7emkLLkWqQBBKk6b8aLesC6UxMF" },
                    { videoId: "H4Uj3tHGqoM", title: "Class 12th Chemistry Board Revision Lecture 1", size: "210 MB", playlistId: "" }
                ];
                localStorage.setItem(DOWNLOADS_STORAGE_KEY, JSON.stringify(localDownloadsArray));
            }

            calculateStorageCapacityMetrics();
            renderOfflineDownloadsGrid(localDownloadsArray);
        }

        // ================= 📊 STORAGE PROGRESS FILL METRICS =================
        function calculateStorageCapacityMetrics() {
            let totalMegabytesUsed = 0;
            localDownloadsArray.forEach(v => {
                const pureNumber = parseInt(v.size) || 0;
                totalMegabytesUsed += pureNumber;
            });

            // 5GB = 5120MB के स्केल पर गणना करें
            const percentageUsed = (totalMegabytesUsed / 5120) * 100;
            
            document.getElementById('storageMetricsLabelNode').innerText = `${totalMegabytesUsed} MB Used / 5.0 GB Max`;
            document.getElementById('storageBarFillNode').style.width = `${Math.max(percentageUsed, 3)}%`;
        }

        // ================= 🔀 RENDERING MATRIX ROWS =================
        function renderOfflineDownloadsGrid(dataList) {
            const container = document.getElementById('downloadRowsStackUI');
            const emptyPrompt = document.getElementById('emptyDownloadPromptUI');

            if (!dataList || dataList.length === 0) {
                container.innerHTML = "";
                emptyPrompt.style.display = "flex";
                return;
            }
            emptyPrompt.style.display = "none";
            container.innerHTML = "";

            dataList.forEach(v => {
                const row = document.createElement('div');
                row.className = "download-video-row";
                // क्लिक करने पर स्पेशल ऑफलाइन फ्लैग के साथ प्लेयर पर ले जाएं
                row.onclick = () => window.location.href = `videoplay.html?v=${v.videoId}&list=${v.playlistId || ''}&offline=true`;

                row.innerHTML = `
                    <div class="row-thumb-shell">
                        <img src="https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg" alt="Offline Thumbnail">
                        <div class="offline-status-badge">✓ Offline</div>
                    </div>
                    <div class="row-meta-data">
                        <h4 class="v-title">${v.title}</h4>
                        <div class="v-size">
                            <img src="icons/playlist.png" alt="Size">
                            <span>${v.size} • Available Offline</span>
                        </div>
                    </div>
                    <button class="delete-download-btn" onclick="purgeSingleOfflineVideo(event, '${v.videoId}')" title="Delete Download">
                        <img src="icons/delete.png" alt="Purge">
                    </button>
                `;
                container.appendChild(row);
            });
        }

        // ================= 🔍 OFFLINE LOCAL SEARCH DATA =================
        function executeDownloadsSearch() {
            const query = document.getElementById('downloadSearchInputNode').value.trim().toLowerCase();
            if (!query) {
                renderOfflineDownloadsGrid(localDownloadsArray);
                return;
            }

            const filtered = localDownloadsArray.filter(v => v.title.toLowerCase().includes(query));
            renderOfflineDownloadsGrid(filtered);
        }

        // ================= 🗑️ DELETE DOWNLOADED NODE =================
        function purgeSingleOfflineVideo(event, videoId) {
            event.stopPropagation(); // रो क्लिक ट्रिगर ब्लॉक करें
            if(confirm("Are you sure you want to completely delete this video from offline storage?")) {
                localDownloadsArray = localDownloadsArray.filter(v => v.videoId !== videoId);
                localStorage.setItem(DOWNLOADS_STORAGE_KEY, JSON.stringify(localDownloadsArray));
                
                calculateStorageCapacityMetrics();
                renderOfflineDownloadsGrid(localDownloadsArray);
            }
        }

        // ================= 📡 PARENT DASHBOARD THEME SIGNAL RECEIVER =================
        window.addEventListener('message', function(event) {
            const messagePacket = event.data;
            if (messagePacket.type === 'theme') {
                if (messagePacket.mode === 'dark') {
                    document.body.classList.add('dark-mode');
                } else {
                    document.body.classList.remove('dark-mode');
                }
            }
        });

        // Launch Core Engine Node
        window.addEventListener('DOMContentLoaded', initializeDownloadsEngine);
    </script>
</body>
</html>
