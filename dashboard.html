<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FocusTube | Student Dashboard 📺</title>
    <style>
        /* ================= 🎨 BRAND ARCHITECTURE (YOUTUBE RED & WHITE) ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        :root {
            --yt-red: #ff0000;
            --yt-dark-red: #cc0000;
            --pure-white: #ffffff;
            --bg-light: #f9f9f9;
            --text-dark: #0f0f0f;
            --text-muted: #606060;
            --border-color: #e5e5e5;
            --hover-bg: #f2f2f2;
        }

        /* 🌙 ULTRA-PROTECTED EYE GUARD DARK MODE */
        body.student-dark-mode {
            --bg-light: #0f0f0f;
            --text-dark: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #272727;
            --hover-bg: #383838;
            --pure-white: #212121;
            background-color: #0f0f0f;
        }

        body { background-color: var(--bg-light); color: var(--text-dark); transition: background 0.3s, color 0.3s; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* 📡 TOP MASTER NAVIGATION BAR */
        .header-dock { background: var(--pure-white); border-bottom: 1px solid var(--border-color); padding: 10px 4%; display: flex; justify-content: space-between; align-items: center; height: 70px; position: relative; z-index: 10; }
        
        .brand-logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.3rem; text-decoration: none; color: var(--text-dark); }
        .brand-logo img { width: 30px; height: 34px; object-fit: contain; }
        .brand-logo span { color: var(--yt-red); }

        /* 🔍 DYNAMIC ENCAPSULATED FILTER SEARCH BAR */
        .search-container { flex: 0 1 500px; display: flex; align-items: center; position: relative; margin: 0 15px; }
        .search-bar-input { width: 100%; padding: 12px 20px; border-radius: 25px 0 0 25px; border: 1px solid var(--border-color); background: var(--bg-light); color: var(--text-dark); outline: none; font-size: 0.95rem; }
        .search-bar-input:focus { border-color: var(--yt-red); background: var(--pure-white); }
        
        .btn-search-trigger { background: var(--bg-light); border: 1px solid var(--border-color); border-left: none; padding: 0 22px; height: 44px; border-radius: 0 25px 25px 0; cursor: pointer; font-size: 1.1rem; color: var(--text-dark); transition: 0.2s; }
        .btn-search-trigger:hover { background: var(--hover-bg); }

        .header-actions { display: flex; align-items: center; gap: 15px; }
        .btn-eye-guard { background: transparent; border: 1px solid var(--border-color); padding: 8px 14px; border-radius: 20px; color: var(--text-dark); cursor: pointer; font-weight: 700; font-size: 0.8rem; }

        /* 🎛️ MAIN WORKSPACE GRID LAYER */
        .workspace-wrapper { flex: 1; display: flex; position: relative; height: calc(100vh - 70px); overflow: hidden; }

        /* 💻 LAPTOP NAVIGATION SIDEBAR */
        .sidebar-dock { width: 240px; background: var(--pure-white); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding-top: 15px; flex-shrink: 0; }
        
        .sidebar-item { display: flex; align-items: center; gap: 20px; padding: 14px 24px; color: var(--text-dark); text-decoration: none; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
        .sidebar-item:hover, .sidebar-item.active { background: var(--hover-bg); }
        .sidebar-item.active { border-left-color: var(--yt-red); color: var(--yt-red); }

        /* 📺 DYNAMIC CONTENT DISPLAY NODES */
        .main-content-stream { flex: 1; padding: 25px; overflow-y: auto; display: block; position: relative; }
        
        /* App Rooms Hidden States */
        .app-view-room { display: none; width: 100%; height: 100%; }
        .app-view-room.active-room { display: block; }

        /* 📱 PERFECT MOBILE BOTOM NAVIGATION BAR BARRIER */
        .mobile-bottom-dock { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: var(--pure-white); border-top: 1px solid var(--border-color); display: none; justify-content: space-around; align-items: center; z-index: 100; }
        
        .mobile-nav-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); text-decoration: none; font-size: 0.72rem; font-weight: 700; cursor: pointer; flex: 1; height: 100%; gap: 4px; }
        .mobile-nav-btn.active { color: var(--yt-red); }
        .mobile-nav-icon { font-size: 1.25rem; }

        /* 🚨 RESPONSIVE ENGINEERING OVERRIDES */
        @media (max-width: 768px) {
            .sidebar-dock { display: none; }
            .mobile-bottom-dock { display: flex; }
            .header-dock { padding: 10px 15px; }
            .search-container { flex: 1; margin: 0 10px; }
            .search-bar-input { padding: 10px 15px; font-size: 0.88rem; }
            .btn-search-trigger { padding: 0 15px; height: 38px; }
            .btn-eye-guard { display: none; } /* Hide text toggle on mobile header to save space */
            .main-content-stream { padding: 15px 15px 85px 15px; } /* Prevent bottom nav clipping */
        }
    </style>
</head>
<body>

    <header class="header-dock">
        <a href="index.html" class="brand-box brand-logo">
            <img src="logo.png" alt="FocusTube Control Engine">
            Focus<span>Tube</span>
        </a>

        <div class="search-container">
            <input type="text" class="search-input search-bar-input" id="globalSearchInput" placeholder="Search educational parameters...">
            <button class="btn-search-trigger" onclick="executeFirewalledSearchNode()">🔍</button>
        </div>

        <div class="header-actions">
            <button class="btn-theme-toggle btn-eye-guard" onclick="toggleStudentDashboardTheme()" id="themeBtnTxt">👁️ Eye Guard On</button>
        </div>
    </header>

    <div class="workspace-wrapper">
        
        <aside class="sidebar-dock">
            <div class="sidebar-item active" onclick="switchActiveRoomNode('homeRoom', this)">
                <span style="font-size: 1.2rem;">🏠</span> Home Hub
            </div>
            <div class="sidebar-item" onclick="switchActiveRoomNode('whitelistRoom', this)">
                <span style="font-size: 1.2rem;">🛡️</span> Whitelist
            </div>
            <div class="sidebar-item" onclick="switchActiveRoomNode('notifyRoom', this)">
                <span style="font-size: 1.2rem;">🔔</span> Alerts
            </div>
            <div class="sidebar-item" onclick="switchActiveRoomNode('adminGateRoom', this)">
                <span style="font-size: 1.2rem;">⚙️</span> Parent Zone
            </div>
        </aside>

        <main class="main-content-stream" id="contentStreamContainer">
            
            <div class="app-view-room active-room" id="homeRoom">
                </div>

            <div class="app-view-room" id="whitelistRoom">
                </div>

            <div class="app-view-room" id="notifyRoom">
                </div>

            <div class="app-view-room" id="adminGateRoom">
                </div>

        </main>
    </div>

    <nav class="mobile-bottom-dock">
        <div class="mobile-nav-btn active" onclick="switchActiveRoomNode('homeRoom', this)">
            <span class="mobile-nav-icon">🏠</span><div>Home</div>
        </div>
        <div class="mobile-nav-btn" onclick="switchActiveRoomNode('whitelistRoom', this)">
            <span class="mobile-nav-icon">🛡️</span><div>Whitelist</div>
        </div>
        <div class="mobile-nav-btn" onclick="switchActiveRoomNode('notifyRoom', this)">
            <span class="mobile-nav-icon">🔔</span><div>Alerts</div>
        </div>
        <div class="mobile-nav-btn" onclick="switchActiveRoomNode('adminGateRoom', this)">
            <span class="mobile-nav-icon">⚙️</span><div>Admin</div>
        </div>
    </nav>

    <!-- 🧠 FINAL ENGINE: FIREBASE COMPAT + MULTI-CHANNEL YOUTUBE API AGGREGATOR -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // 🎯 100% SECURE FIREBASE CONFIGURATION (focustube-72084)
        const firebaseConfig = {
            apiKey: "AIzaSyBUvLFPdm2BmfwfTTYJPM2Cb02OOHPtH9M",
            authDomain: "focustube-72084.firebaseapp.com",
            projectId: "focustube-72084",
            storageBucket: "focustube-72084.firebasestorage.app",
            messagingSenderId: "988104840416",
            appId: "1:988104840416:web:d18dcb90b0c71da53b6c85"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 🔑 PREMIUM YOUTUBE CORE API ACCELERATOR GATEWAY KEY
        const YT_GATEWAY_KEY = "AIzaSyBdyln75P_abb8FBZb7J_1JNlDZ39k5oIQ"; 

        let currentUser = null;
        let currentActiveVideoId = "";
        let whitelistedChannelsArray = []; 
        let globalAggregatedVideos = []; // सभी चैनलों के मिक्स्ड वीडियोस होल्ड करने के लिए

        // 👁️ DYNAMIC EYE GUARD MANAGER
        function toggleStudentDashboardTheme() {
            const body = document.body;
            const btn = document.getElementById('themeBtnTxt');
            body.classList.toggle('student-dark-mode');
            btn.innerText = body.classList.contains('student-dark-mode') ? "☀️ Eye Guard Off" : "👁️ Eye Guard On";
        }

        // 🔄 ASYNC APPMODULE NAVIGATION PANEL
        function switchActiveRoomNode(roomId, element) {
            document.querySelectorAll('.app-room-module').forEach(room => room.classList.remove('active-room-view'));
            document.getElementById(roomId).classList.add('active-room-view');
            document.querySelectorAll('.sidebar-node-btn').forEach(i => i.classList.remove('active-node'));
            document.querySelectorAll('.mobile-node-btn').forEach(b => b.classList.remove('active-node'));
            element.classList.add('active-node');

            if(roomId === 'homeRoom') syncParentWhitelistWithHomeHub();
            if(roomId === 'whitelistRoom') loadWhitelistedChannelsProfiles();
            if(roomId === 'notifyRoom') loadLatestAlertsNotificationHub();
            if(roomId === 'adminGateRoom') renderParentAdministrativePanel();
        }

        function toggleSubmitButtonState(input) {
            const btn = document.getElementById('commentSubmitBtn');
            if(input.value.trim().length > 0) btn.classList.add('active-entry');
            else btn.classList.remove('active-entry');
        }

        // ================= 🏠 CORE INTERCEPT: REALTIME FIRESTORE SYNC =================
        function syncParentWhitelistWithHomeHub() {
            if (!currentUser) return;
            
            // डेटाबेस से लाइव Pinned Channels की लिस्ट फेच करना
            db.collection("pinned_channels").where("parentUid", "==", currentUser.uid)
              .onSnapshot((snapshot) => {
                  whitelistedChannelsArray = [];
                  snapshot.forEach(doc => whitelistedChannelsArray.push(doc.data().channelId));
                  
                  // Safe Boundary Condition: अगर पैरेंट्स ने अभी कोई चैनल पिन नहीं किया है
                  if(whitelistedChannelsArray.length === 0) {
                      whitelistedChannelsArray = ["UCwAdPRX48N01M6ywN1fI85A", "UCioThmkvwUorIisXPrx766A"]; // डियर सर और खान सर
                  }
                  fetchMultiChannelAggregatedFeeds();
              }, err => {
                  whitelistedChannelsArray = ["UCwAdPRX48N01M6ywN1fI85A", "UCioThmkvwUorIisXPrx766A"];
                  fetchMultiChannelAggregatedFeeds();
              });
        }

        // ================= 📡 NEXT-GEN MULTI-CHANNEL API AGGREGATOR ENGINE =================
        async function fetchMultiChannelAggregatedFeeds() {
            document.getElementById('videoGridShell').innerHTML = `<div class="pulse-placeholder">Compiling classroom feeds matrix from verified channels...</div>`;
            document.getElementById('shortsCarouselShell').innerHTML = `<div class="pulse-placeholder">Syncing standalone micro loops...</div>`;
            
            globalAggregatedVideos = [];
            let promises = [];

            // पैरेंट्स द्वारा अप्रूव्ड सभी चैनलों पर एक साथ समानांतर (Parallel) प्रहार करना
            whitelistedChannelsArray.forEach(id => {
                const apiUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=6&order=date&channelId=${id}&type=video&key=${YT_GATEWAY_KEY}`;
                let fetchPromise = fetch(apiUrl)
                    .then(res => res.json())
                    .then(data => {
                        if(data.items) globalAggregatedVideos.push(...data.items);
                    })
                    .catch(err => console.log("API Fetch Blocked for ID: " + id, err));
                promises.push(fetchPromise);
            });

            // सारे चैनलों का डेटा आने का इंतज़ार करना
            await Promise.all(promises);

            // डेटा को टाइमस्टैम्प (Newest First) के आधार पर सॉर्ट करना ताकि स्टूडेंट को हमेशा ताज़ा कंटेंट मिले
            globalAggregatedVideos.sort((a, b) => new Date(b.snippet.publishedAt) - new Date(a.snippet.publishedAt));

            renderVideoGridMatrix(globalAggregatedVideos, 'videoGridShell');
            renderShortsCarouselMatrix(globalAggregatedVideos);
        }

        function renderVideoGridMatrix(items, targetShellId) {
            const shell = document.getElementById(targetShellId);
            if(!items || items.length === 0) {
                shell.innerHTML = `<div class="pulse-placeholder">⚠️ No classroom videos detected in this parameter.</div>`;
                return;
            }
            shell.innerHTML = "";
            items.forEach(video => {
                const vidId = video.id.videoId || video.id;
                shell.innerHTML += `
                    <div class="yt-video-card" onclick="launchSecurePlayerEngine('${vidId}', 'video')">
                        <div class="card-thumbnail-box"><img src="${video.snippet.thumbnails.medium.url}"></div>
                        <div class="card-metadata-row">
                            <div class="student-avatar-mock" style="background:#cc0000; font-size:0.75rem; font-weight:800;">LIVE</div>
                            <div class="meta-strings-block">
                                <h4 class="yt-card-title">${video.snippet.title}</h4>
                                <p class="yt-card-channel-name">${video.snippet.channelTitle}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function renderShortsCarouselMatrix(items) {
            const shell = document.getElementById('shortsCarouselShell');
            if(!items || items.length === 0) {
                shell.innerHTML = `<div class="pulse-placeholder">No shorts loop found.</div>`;
                return;
            }
            shell.innerHTML = "";
            items.slice(0, 10).forEach(short => {
                const vidId = short.id.videoId || short.id;
                shell.innerHTML += `
                    <div class="yt-shorts-card" onclick="launchSecurePlayerEngine('${vidId}', 'shorts')">
                        <img src="${short.snippet.thumbnails.medium.url}">
                        <div class="shorts-gradient-overlay"><h4 class="yt-shorts-title">${short.snippet.title}</h4></div>
                    </div>
                `;
            });
        }

        // ================= 🔍 FIREWALLED FILTER SEARCH LOGIC =================
        function executeFirewalledSearchNode() {
            const query = document.getElementById('globalSearchInput').value.trim();
            if(!query) return;
            document.getElementById('videoGridShell').innerHTML = `<div class="pulse-placeholder">Filtering streams inside secure arrays...</div>`;
            
            // फ़ायरवॉल सर्च: यह सिर्फ सबसे पहले एक्टिव पिन चैनल के स्निपेट्स में ही खोजेगा
            const requestApiUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=15&q=${encodeURIComponent(query)}&channelId=${whitelistedChannelsArray[0]}&type=video&key=${YT_GATEWAY_KEY}`;
            fetch(requestApiUrl).then(res => res.json()).then(data => renderVideoGridMatrix(data.items, 'videoGridShell')).catch(err => console.log(err));
        }

        // ================= 🛡️ WHITELIST PROFILES & ALERTS SYSTEM NODES =================
        function loadWhitelistedChannelsProfiles() {
            const shell = document.getElementById('parentWhitelistGridShell');
            shell.innerHTML = `<div class="pulse-placeholder">Querying authorized profiles...</div>`;
            
            if(whitelistedChannelsArray.length === 0) return;
            shell.innerHTML = "";
            
            whitelistedChannelsArray.forEach(id => {
                fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet&id=${id}&key=${YT_GATEWAY_KEY}`)
                .then(res => res.json()).then(data => {
                    if(data.items && data.items.length > 0) {
                        const info = data.items[0].snippet;
                        shell.innerHTML += `
                            <div class="yt-video-card" style="align-items:center; padding:30px; background:var(--pure-white); border-radius:16px; border:1px solid var(--border-color);" onclick="filterFeedBySingleInstructor('${id}')">
                                <img src="${info.thumbnails.medium.url}" style="width:90px; height:90px; border-radius:50%; margin-bottom:12px; border:3px solid var(--yt-red);">
                                <h4 class="yt-card-title" style="text-align:center; font-size:1.05rem;">${info.title}</h4>
                                <p style="color:var(--yt-red); font-size:0.8rem; font-weight:800; text-transform:uppercase; letter-spacing:0.5px;">Verified Instructor ✅</p>
                            </div>
                        `;
                    }
                });
            });
        }

        function filterFeedBySingleInstructor(id) {
            document.getElementById('videoGridShell').innerHTML = `<div class="pulse-placeholder">Isolating instructor feeds...</div>`;
            fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=12&order=date&channelId=${id}&type=video&key=${YT_GATEWAY_KEY}`)
            .then(res => res.json()).then(data => {
                switchActiveRoomNode('homeRoom', document.querySelector('.sidebar-node-btn'));
                renderVideoGridMatrix(data.items, 'videoGridShell');
            });
        }

        function loadLatestAlertsNotificationHub() {
            document.getElementById('liveAlertsGridShell').innerHTML = `<div class="pulse-placeholder">Scanning live update buffers...</div>`;
            renderVideoGridMatrix(globalAggregatedVideos, 'liveAlertsGridShell');
        }

        // ================= ⚙️ NEW: PARENT CUSTODY CONTROL PANEL INTERFACE =================
        function renderParentAdministrativePanel() {
            const panel = document.getElementById('adminGateRoom');
            
            // एडमिन रूम का अल्ट्रा-क्लीन फॉर्म लेआउट
            panel.innerHTML = `
                <div style="max-width: 550px; background: var(--pure-white); border:1px solid var(--border-color); padding:35px; border-radius:20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin: 20px auto 0 auto;">
                    <h3 style="font-size:1.4rem; font-weight:800; margin-bottom:10px; letter-spacing:-0.5px;">🛡️ Whitelist Administration</h3>
                    <p style="color:var(--text-muted); font-size:0.88rem; margin-bottom:25px; font-weight:600;">Add new authorized instructor channels directly into the student terminal matrix via YouTube Channel ID.</p>
                    
                    <div style="display:flex; flex-direction:column; gap:16px;">
                        <div>
                            <label style="font-size:0.82rem; font-weight:800; text-transform:uppercase; display:block; margin-bottom:6px;">YouTube Channel ID</label>
                            <input type="text" id="newChannelIdInput" placeholder="e.g., UCwAdPRX48N01M6ywN1fI85A" style="width:100%; height:44px; border-radius:10px; border:1px solid var(--border-color); padding:0 16px; font-size:0.95rem; background:var(--bg-main); color:var(--text-main); outline:none;">
                        </div>
                        <button onclick="commitNewChannelToFirebaseMatrix()" style="width:100%; height:46px; background:var(--yt-red); color:white; border:none; border-radius:10px; font-size:1rem; font-weight:700; cursor:pointer; transition:0.2s;">⚡ Pin Channel Live</button>
                    </div>
                    <div id="adminStatusFeedback" style="margin-top:15px; text-align:center; font-size:0.9rem; font-weight:700;"></div>
                </div>
            `;
        }

        function commitNewChannelToFirebaseMatrix() {
            const idInput = document.getElementById('newChannelIdInput').value.trim();
            const feedback = document.getElementById('adminStatusFeedback');
            if(!idInput) return;

            feedback.style.color = "var(--text-main)";
            feedback.innerText = "Validating secure token...";

            // डेटाबेस में नया चैनल डॉक्यूमेंट इंजेक्ट करना
            db.collection("pinned_channels").add({
                channelId: idInput,
                parentUid: currentUser.uid,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                feedback.style.color = "#34A353";
                feedback.innerText = "Success! Matrix updated seamlessly. ✅";
                document.getElementById('newChannelIdInput').value = "";
            })
            .catch(err => {
                feedback.style.color = "var(--yt-red)";
                feedback.innerText = "Error: " + err.message;
            });
        }

        // ================= 🎬 VIDEO PLAYER THEATER CONTROL SYSTEM =================
        function launchSecurePlayerEngine(id, type) {
            currentActiveVideoId = id;
            const iframe = document.getElementById('secureVideoIframe');
            iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&modestbranding=1&iv_load_policy=3`;
            if(type === 'shorts') iframe.classList.add('shorts-aspect-mode');
            else iframe.classList.remove('shorts-aspect-mode');
            document.getElementById('globalTheaterModal').classList.add('active-theater');
            listenToIsolatedCommentsRealtime();
        }

        function closeSecureTheaterEngine() {
            document.getElementById('globalTheaterModal').classList.remove('active-theater');
            document.getElementById('secureVideoIframe').src = "";
        }

        /* ================= 💬 FIREBASE SINGLE-USER ISOLATED DOUBT SYSTEM ================= */
        function commitStudentCommentNode() {
            const txt = document.getElementById('doubtCommentInput').value.trim();
            if(!txt || !currentUser) return;
            db.collection("focus_comments").add({
                videoId: currentActiveVideoId,
                studentUid: currentUser.uid,
                studentEmail: currentUser.email.split('@')[0],
                text: txt,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                document.getElementById('doubtCommentInput').value = "";
                document.getElementById('commentSubmitBtn').classList.remove('active-entry');
            });
        }

        function listenToIsolatedCommentsRealtime() {
            db.collection("focus_comments").where("videoId", "==", currentActiveVideoId).where("studentUid", "==", currentUser.uid)
            .orderBy("timestamp", "desc").onSnapshot(snap => {
                const container = document.getElementById('singleUserCommentsContainer');
                container.innerHTML = "";
                if(snap.empty) { container.innerHTML = `<p style="text-align:center; font-size:0.8rem; color:var(--text-muted); padding:10px;">No submitted queries found. Ask your doubt above!</p>`; return; }
                snap.forEach(doc => {
                    const d = doc.data();
                    const i = d.studentEmail ? d.studentEmail.charAt(0).toUpperCase() : "S";
                    container.innerHTML += `
                        <div class="comment-row-bubble">
                            <div class="student-avatar-mock">${i}</div>
                            <div class="comment-text-pack"><h5>${d.studentEmail} (You)</h5><p>${d.text}</p></div>
                        </div>
                    `;
                });
            });
        }

        // 🛡️ AUTHENTICATION LIFE-CYCLE MONITOR ROUTE GUARD
        auth.onAuthStateChanged((user) => {
            if (!user) { window.location.href = "login.html"; }
            else {
                currentUser = user;
                document.getElementById('studentAvatarIcon').innerText = currentUser.email.charAt(0).toUpperCase();
                syncParentWhitelistWithHomeHub();
            }
        });
    </script>
