<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FocusTube Terminal 📺</title>
    <style>
        /* ================= 🎨 ORIGINAL YOUTUBE LIGHT DESIGN CORES ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', 'Segoe UI', Arial, sans-serif; }
        
        :root {
            --yt-red: #ff0000;
            --pure-white: #ffffff;
            --bg-main: #ffffff;
            --text-main: #0f0f0f;
            --text-muted: #606060;
            --border-color: #e5e5e5;
            --search-border: #cccccc;
            --search-bg: #f8f8f8;
            --sidebar-hover: #f2f2f2;
            --menu-shadow: rgba(0, 0, 0, 0.1);
            --icon-filter: none; /* लाइट मोड में आईकॉन नॉर्मल रहेंगे */
        }

        /* 🌙 SYSTEM CHILD NODE: MANUAL DARK THEME INTERCEPT */
        body.student-dark-mode {
            --bg-main: #0f0f0f;
            --pure-white: #212121;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #303030;
            --search-border: #303030;
            --search-bg: #121212;
            --sidebar-hover: #3d3d3d;
            --menu-shadow: rgba(0, 0, 0, 0.5);
            --icon-filter: invert(1); /* डार्क मोड में सारे ब्लैक आइकॉन्स व्हाइट हो जाएंगे 🔥 */
            background-color: #0f0f0f;
        }

        body { background-color: var(--bg-main); color: var(--text-main); transition: background 0.2s, color 0.2s; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* 📡 TOP MASTER NAVBAR ROW */
        .navbar-dock { background: var(--pure-white); padding: 0 16px; display: flex; justify-content: space-between; align-items: center; height: 56px; position: relative; z-index: 100; border-bottom: 1px solid var(--border-color); }
        
        .left-meta-zone { display: flex; align-items: center; gap: 16px; }
        .hamburger-menu-btn { width: 40px; height: 40px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .hamburger-menu-btn:hover { background: var(--sidebar-hover); }
        
        /* आईकॉन इमेज के फिल्टर का नियम */
        .hamburger-icon-img, .search-icon-img, .voice-icon-img, .nav-icon-img, .dropdown-icon-img, .sidebar-icon-img { 
            width: 24px; height: 24px; object-fit: contain; filter: var(--icon-filter); transition: filter 0.2s; 
        }
        
        .brand-box { display: flex; align-items: center; gap: 4px; font-weight: 700; font-size: 1.15rem; text-decoration: none; color: var(--text-main); letter-spacing: -0.5px; }
        .brand-logo-img { width: 24px; height: 24px; object-fit: contain; filter: none !important; } /* लोगो का रंग नहीं बदलेगा */
        .brand-box span { color: var(--yt-red); }

        /* 🔍 DYNAMIC SYSTEM SEARCH & VOICE PORTS */
        .search-center-wrapper { flex: 0 1 640px; display: flex; align-items: center; gap: 12px; margin: 0 20px; }
        .search-input-group { display: flex; width: 100%; align-items: center; }
        
        .search-input-box { width: 100%; height: 40px; padding: 0 16px; border-radius: 40px 0 0 40px; border: 1px solid var(--search-border); background: var(--search-bg); color: var(--text-main); outline: none; font-size: 0.92rem; }
        .search-input-box:focus { border-color: #1c62b9; background: var(--pure-white); }
        
        .btn-search-trigger { background: var(--search-bg); border: 1px solid var(--search-border); border-left: none; padding: 0 24px; height: 40px; border-radius: 0 40px 40px 0; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-search-trigger:hover { background: var(--sidebar-hover); }
        .search-icon-img { width: 18px; height: 18px; }
        
        .btn-voice-search { background: var(--search-bg); border: 1px solid var(--search-border); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-voice-search:hover { background: var(--sidebar-hover); }
        .voice-icon-img { width: 20px; height: 20px; }

        /* 👤 RIGHT CONTROLS GATEWAY */
        .right-control-pack { display: flex; align-items: center; gap: 8px; position: relative; }
        .btn-eye-guard { background: transparent; border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 16px; color: var(--text-main); cursor: pointer; font-weight: 600; font-size: 0.75rem; margin-right: 4px; }
        .btn-eye-guard:hover { background: var(--sidebar-hover); }
        
        .nav-btn-link { width: 40px; height: 40px; background: transparent; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 50%; text-decoration: none; }
        .nav-btn-link:hover { background: var(--sidebar-hover); }

        .user-avatar-trigger-box { width: 32px; height: 32px; border-radius: 50%; background: #0073e6; color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; cursor: pointer; overflow: hidden; border: 1px solid var(--border-color); margin-left: 4px; }
        .user-avatar-trigger-box img { width: 100%; height: 100%; object-fit: cover; display: none; }

        /* 👤 PREMIUM YOUTUBE-STYLE PROFILE DROPDOWN MENU */
        .profile-dropdown-menu { display: none; position: absolute; top: 48px; right: 0; background: var(--pure-white); border: 1px solid var(--border-color); border-radius: 8px; width: 260px; box-shadow: 0 4px 20px var(--menu-shadow); padding: 8px 0; z-index: 1010; }
        .profile-dropdown-menu.active-menu { display: block; }
        
        .dropdown-user-card { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border-color); }
        .dropdown-user-meta h4 { font-size: 0.88rem; font-weight: 600; color: var(--text-main); }
        .dropdown-user-meta p { font-size: 0.75rem; color: var(--text-muted); }
        
        .dropdown-item-link { display: flex; align-items: center; gap: 14px; padding: 10px 16px; color: var(--text-main); text-decoration: none; font-size: 0.85rem; font-weight: 500; cursor: pointer; }
        .dropdown-item-link:hover { background: var(--sidebar-hover); }
        .dropdown-icon-img { width: 20px; height: 20px; }

        /* 🎛️ SYSTEM CORE SPACE MODULES CONTAINER */
        .app-workspace-body { flex: 1; display: flex; height: calc(100vh - 56px); overflow: hidden; position: relative; }

        /* 💻 COMPREHENSIVE 9-WAY SIDEBAR SYSTEM LIST */
        .sidebar-wrapper { width: 240px; background: var(--pure-white); display: flex; flex-direction: column; padding: 12px 0; flex-shrink: 0; overflow-y: auto; border-right: 1px solid var(--border-color); }
        .sidebar-wrapper.collapsed { width: 72px; }
        .sidebar-wrapper.collapsed .sidebar-text, .sidebar-wrapper.collapsed .section-divider, .sidebar-wrapper.collapsed .sidebar-heading { display: none; }
        .sidebar-wrapper.collapsed .sidebar-node-btn { justify-content: center; padding: 12px 0; margin: 0; border-radius: 0; }
        
        .sidebar-node-btn { display: flex; align-items: center; gap: 24px; padding: 10px 24px; color: var(--text-main); text-decoration: none; font-weight: 500; font-size: 0.85rem; cursor: pointer; transition: background 0.1s; border-radius: 8px; margin: 0 12px; }
        .sidebar-node-btn:hover { background: var(--sidebar-hover); }
        .sidebar-node-btn.active-node { background: var(--sidebar-hover); font-weight: 600; color: var(--yt-red); }
        
        .sidebar-heading { font-size: 0.8rem; font-weight: 600; padding: 12px 24px 6px 24px; color: var(--text-main); text-transform: uppercase; letter-spacing: 0.2px; }
        .section-divider { height: 1px; background: var(--border-color); margin: 8px 0; width: 100%; }

        /* ================= 📺 ASYNC IFRAME PANEL (DASHBOARD INNER TERMINAL) ================= */
        .main-feed-panel { flex: 1; width: 100%; height: 100%; background: var(--bg-main); padding: 0; overflow: hidden; position: relative; }
        .secure-app-iframe { width: 100%; height: 100%; border: none; background: transparent; }

        /* 📱 RESPONSIVE CALIBRATION OVERRIDES */
        @media (max-width: 768px) {
            .sidebar-wrapper { display: none; }
            .search-center-wrapper { flex: 1; margin: 0 4px; }
            .search-input-box { height: 36px; font-size: 0.88rem; padding: 0 12px; }
            .btn-search-trigger { height: 36px; padding: 0 14px; }
            .btn-voice-search, .btn-eye-guard, .hamburger-menu-btn { display: none; }
            .navbar-dock { padding: 0 12px; }
        }
    </style>
</head>
<body class="student-light-mode"> 
    
    <nav class="navbar-dock">
        <div class="left-meta-zone">
            <button class="hamburger-menu-btn" onclick="toggleSidebarCollapseEngine()" title="Menu">
                <img src="path_to_hamburger_icon.png" alt="Menu" class="hamburger-icon-img">
            </button>
            <a href="home.html" class="brand-box">
                <img src="logo.png" alt="FocusTube Hub" class="brand-logo-img">
                Focus<span>Tube</span>
            </a>
        </div>

        <div class="search-center-wrapper">
            <div class="search-input-group">
                <input type="text" class="search-input-box" id="globalSearchInput" placeholder="Search secure parameters...">
                <button class="btn-search-trigger" onclick="triggerSearchInsideIframe()">
                    <img src="path_to_search_icon.png" alt="Search" class="search-icon-img">
                </button>
            </div>
            <button class="btn-voice-search" onclick="alert('Voice recognition pipeline ready...')" title="Search with your voice">
                <img src="path_to_voice_icon.png" alt="Voice Search" class="voice-icon-img">
            </button>
        </div>

        <div class="right-control-pack">
            <button class="btn-eye-guard" onclick="toggleStudentDashboardTheme()" id="themeBtnTxt">👁 Dark Mode</button>
            <a href="notification.html" target="contentFrame" class="nav-btn-link" title="Notifications" onclick="highlightSidebarNode(this)">
                <img src="path_to_notification_icon.png" alt="Notifications" class="nav-icon-img">
            </a>
            
            <div class="user-avatar-trigger-box" id="avatarMenuTrigger" onclick="toggleProfileDropdownMenu()">
                <span id="avatarLetterNode">S</span>
                <img id="avatarActualImageNode" src="" alt="Profile Photo">
            </div>

            <div class="profile-dropdown-menu" id="profileDropdownShell">
                <div class="dropdown-user-card">
                    <div class="user-avatar-trigger-box" style="width: 36px; height: 36px; margin:0;">
                        <span id="dropdownLetterNode">S</span>
                        <img id="dropdownActualImageNode" src="" alt="User Profile">
                    </div>
                    <div class="dropdown-user-meta">
                        <h4 id="dropdownUserEmailNode">Student User</h4>
                        <p style="color: var(--yt-red); font-weight: 700; font-size:0.7rem;">FocusTube Matrix Active</p>
                    </div>
                </div>
                
                <a href="profile.html" target="contentFrame" class="dropdown-item-link" onclick="toggleProfileDropdownMenu()">
                    <img src="path_to_profile_icon.png" alt="Profile" class="dropdown-icon-img"><span class="sidebar-text">Your Profile</span>
                </a>
                <a href="setting.html" target="contentFrame" class="dropdown-item-link" onclick="toggleProfileDropdownMenu()">
                    <img src="path_to_setting_icon.png" alt="Settings" class="dropdown-icon-img"><span class="sidebar-text">Settings</span>
                </a>
                <a href="help.html" target="contentFrame" class="dropdown-item-link" onclick="toggleProfileDropdownMenu()">
                    <img src="path_to_help_icon.png" alt="Help" class="dropdown-icon-img"><span class="sidebar-text">Help Center</span>
                </a>
                <a href="help.html" target="contentFrame" class="dropdown-item-link" onclick="toggleProfileDropdownMenu()">
                    <img src="path_to_feedback_icon.png" alt="Feedback" class="dropdown-icon-img"><span class="sidebar-text">Send Feedback</span>
                </a>
                <div class="section-divider" style="margin: 4px 0;"></div>
                <div class="dropdown-item-link" style="color: var(--yt-red); font-weight: 700;" onclick="triggerSignOutSequence()">
                    <img src="path_to_signout_icon.png" alt="Sign Out" class="dropdown-icon-img"><span class="sidebar-text">Sign Out</span>
                </div>
            </div>
        </div>
    </nav>

    <div class="app-workspace-body">
        
        <aside class="sidebar-wrapper" id="masterSidebarSystem">
            <a href="home.html" target="contentFrame" class="sidebar-node-btn active-node" onclick="highlightSidebarNode(this)">
                <img src="path_to_home_icon.png" alt="Home" class="sidebar-icon-img"><span class="sidebar-text">Home</span>
            </a>
            <a href="whitelist.html" target="contentFrame" class="sidebar-node-btn" onclick="highlightSidebarNode(this)">
                <img src="path_to_whitelist_icon.png" alt="Whitelist" class="sidebar-icon-img"><span class="sidebar-text">Whitelist</span>
            </a>
            <a href="short.html" target="contentFrame" class="sidebar-node-btn" onclick="highlightSidebarNode(this)">
                <img src="path_to_shorts_icon.png" alt="Shorts" class="sidebar-icon-img"><span class="sidebar-text">Shorts</span>
            </a>
            <a href="channel.html" target="contentFrame" class="sidebar-node-btn" onclick="highlightSidebarNode(this)">
                <img src="path_to_channels_icon.png" alt="Channels" class="sidebar-icon-img"><span class="sidebar-text">Channels</span>
            </a>
            <a href="notification.html" target="contentFrame" class="sidebar-node-btn" onclick="highlightSidebarNode(this)">
                <img src="path_to_notification_icon.png" alt="Alerts" class="sidebar-icon-img"><span class="sidebar-text">Notifications</span>
            </a>

            <div class="section-divider"></div>

            <div class="sidebar-heading">Library Space</div>
            <a href="playlist.html" target="contentFrame" class="sidebar-node-btn" onclick="highlightSidebarNode(this)">
                <img src="path_to_playlist_icon.png" alt="Playlists" class="sidebar-icon-img"><span class="sidebar-text">Playlists</span>
            </a>
            <a href="history.html" target="contentFrame" class="sidebar-node-btn" onclick="highlightSidebarNode(this)">
                <img src="path_to_history_icon.png" alt="History" class="sidebar-icon-img"><span class="sidebar-text">History</span>
            </a>
            <a href="like.html" target="contentFrame" class="sidebar-node-btn" onclick="highlightSidebarNode(this)">
                <img src="path_to_like_icon.png" alt="Liked" class="sidebar-icon-img"><span class="sidebar-text">Liked Videos</span>
            </a>
            <a href="download.html" target="contentFrame" class="sidebar-node-btn" onclick="highlightSidebarNode(this)">
                <img src="path_to_download_icon.png" alt="Vault" class="sidebar-icon-img"><span class="sidebar-text">Downloads</span>
            </a>
            <a href="admin.html" target="contentFrame" class="sidebar-node-btn" onclick="highlightSidebarNode(this)">
                <img src="path_to_admin_icon.png" alt="Settings" class="sidebar-icon-img"><span class="sidebar-text">Admin</span>
            </a>
        </aside>

        <main class="main-feed-panel" id="mainFeedPanelCorridor">
            <iframe src="home.html" name="contentFrame" id="contentFrameId" class="secure-app-iframe" allowfullscreen></iframe>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBUvLFPdm2BmfwfTTYJPM2Cb02OOHPtH9M",
            authDomain: "focustube-72084.firebaseapp.com",
            projectId: "focustube-72084",
            storageBucket: "focustube-72084.firebasestorage.app",
            messagingSenderId: "988104840416",
            appId: "1:988104840416:web:d18dcb90b0c71da53b6c85"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // 👁️ LIVE LAYOUT SWITCH ENGINE WITH DARK MODE SUB-THEME SYSTEM SYNC
        function toggleStudentDashboardTheme() {
            const body = document.body;
            const btn = document.getElementById('themeBtnTxt');
            body.classList.toggle('student-dark-mode');
            btn.innerText = body.classList.contains('student-dark-mode') ? "☀︎ Light Mode" : "👁 Dark Mode";
            
            // अंदर खुले हुए iframe पेज को भी डार्क/लाइट मोड का सिग्नल पास करना
            syncIframeThemeState();
        }

        // 🍔 COLLAPSE SIDEBAR NODE LOOP
        function toggleSidebarCollapseEngine() {
            document.getElementById('masterSidebarSystem').classList.toggle('collapsed');
        }

        // 👤 PROFILE DROPDOWN MENU INTERCEPT
        function toggleProfileDropdownMenu() {
            document.getElementById('profileDropdownShell').classList.toggle('active-menu');
        }

        // 🚪 SECURE SIGN OUT PROTOCOL
        function triggerSignOutSequence() {
            auth.signOut().then(() => {
                window.location.href = "login.html";
            }).catch(err => alert(err.message));
        }

        // Sidebar active highlighter function
        function highlightSidebarNode(element) {
            document.querySelectorAll('.sidebar-node-btn').forEach(btn => btn.classList.remove('active-node'));
            // अगर नोटिफिकेशन बेल पर क्लिक हुआ तो साइडबार का नोटिफिकेशन लिंक एक्टिव होगा
            if (element.classList.contains('sidebar-node-btn')) {
                element.classList.add('active-node');
            } else {
                // नोटिफिकेशन लिंक को खोजकर एक्टिव करें
                const notiBtn = document.querySelector('aside a[href="notification.html"]');
                if(notiBtn) notiBtn.classList.add('active-node');
            }
        }

        // सर्च बार की क्वेरी को iframe पेज के अंदर भेजने का मैकेनिज्म
        function triggerSearchInsideIframe() {
            const query = document.getElementById('globalSearchInput').value.trim();
            const iframe = document.getElementById('contentFrameId');
            if(query && iframe.contentWindow) {
                // iframe के अंदर 'searchTriggered' नाम का कस्टम इवेंट पोस्ट करना
                iframe.contentWindow.postMessage({ type: 'search', value: query }, '*');
            }
        }

        // थीम स्टेट को iframe के अंदर ट्रांसफर करने का सिंक मैनेजर
        function syncIframeThemeState() {
            const isDarkMode = document.body.classList.contains('student-dark-mode');
            const iframe = document.getElementById('contentFrameId');
            if(iframe && iframe.contentWindow) {
                iframe.contentWindow.postMessage({ type: 'theme', mode: isDarkMode ? 'dark' : 'light' }, '*');
            }
        }

        // जब भी नया iframe लोड हो, उसे पैरेंट डैशबोर्ड की थीम ऑटोमैटिकली मिल जानी चाहिए
        document.getElementById('contentFrameId').addEventListener('load', syncIframeThemeState);

        // Auto-close overlay layout bounds check
        window.addEventListener('click', function(e) {
            const trigger = document.getElementById('avatarMenuTrigger');
            const shell = document.getElementById('profileDropdownShell');
            if (trigger && !trigger.contains(e.target) && shell && !shell.contains(e.target)) {
                shell.classList.remove('active-menu');
            }
        });

        // 🛡️ PWA PERSISTENT STATE MONITOR GUARD
        auth.onAuthStateChanged((user) => {
            if (!user) { 
                window.location.href = "login.html"; 
            } else {
                const letter = user.email.charAt(0).toUpperCase();
                document.getElementById('avatarLetterNode').innerText = letter;
                document.getElementById('dropdownLetterNode').innerText = letter;
                document.getElementById('dropdownUserEmailNode').innerText = user.email.split('@')[0];
                localStorage.setItem('focustube_session_active', 'true');
            }
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js', { scope: './' })
                    .then(reg => console.log('FocusTube Offline Engine Synced safely.'))
                    .catch(err => console.log('ServiceWorker pipeline offline.', err));
            });
        }
    </script>
</body>
</html>
