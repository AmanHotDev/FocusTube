<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusTube Home Feed 🏠</title>
    <style>
        /* ================= 🎨 YOUTUBE LIGHT THEME (DEFAULT) ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', 'Segoe UI', sans-serif; }
        
        :root {
            --yt-red: #ff0000;
            --bg-home: #ffffff;
            --text-main: #0f0f0f;
            --text-muted: #606060;
            --tag-bg: #f2f2f2;
            --tag-text: #0f0f0f;
            --tag-active-bg: #0f0f0f;
            --tag-active-text: #ffffff;
            --border-color: #e5e5e5;
        }

        /* 🌙 DASHBOARD SYNC: TRUE DARK MODE INTERNAL */
        body.dark-mode {
            --bg-home: #0f0f0f;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --tag-bg: #272727;
            --tag-text: #ffffff;
            --tag-active-bg: #ffffff;
            --tag-active-text: #0f0f0f;
            --border-color: #303030;
        }

        body { background-color: var(--bg-home); color: var(--text-main); transition: background 0.2s, color 0.2s; padding: 12px 24px 40px 24px; overflow-x: hidden; }

        /* 🏷️ YOUTUBE STYLE SCROLLABLE TAGS BAR */
        .tags-carousel-container { display: flex; gap: 12px; overflow-x: auto; padding: 4px 0 16px 0; background: var(--bg-home); position: sticky; top: 0; z-index: 50; scrollbar-width: none; }
        .tags-carousel-container::-webkit-scrollbar { display: none; }
        
        .yt-tag-btn { background: var(--tag-bg); color: var(--tag-text); border: none; padding: 6px 12px; border-radius: 8px; font-size: 0.88rem; font-weight: 500; cursor: pointer; white-space: nowrap; transition: background 0.1s; }
        .yt-tag-btn:hover { background: var(--border-color); }
        .yt-tag-btn.active { background: var(--tag-active-bg); color: var(--tag-active-text); }

        /* ================= 📺 BOLDEST YOUTUBE PLAYLIST FEED STRUCTURE ================= */
        .feed-container-stream { display: flex; flex-direction: column; gap: 40px; margin-top: 12px; }
        .long-videos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; row-gap: 32px; }
        
        .yt-video-card { display: flex; flex-direction: column; gap: 12px; cursor: pointer; background: transparent; }
        .thumbnail-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; position: relative; border: 1px solid var(--border-color); }
        .thumbnail-wrapper iframe { width: 100%; height: 100%; border: none; }
        
        .video-meta-row { display: flex; gap: 12px; padding: 0 4px; }
        .channel-avatar-mock { width: 36px; height: 36px; border-radius: 50%; background: var(--yt-red); color: white; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; }
        
        .text-meta-block { flex: 1; overflow: hidden; }
        .video-title-string { font-size: 0.95rem; font-weight: 600; line-height: 1.4; color: var(--text-main); margin-bottom: 4px; }
        .channel-name-string { font-size: 0.82rem; color: var(--text-muted); font-weight: 500; }

        .pulse-placeholder { text-align: center; padding: 80px; color: var(--text-muted); font-size: 0.95rem; font-weight: 500; }

        @media (max-width: 480px) {
            .long-videos-grid { grid-template-columns: 1fr; }
            body { padding: 10px 12px; }
        }
    </style>
</head>
<body>

    <!-- 🏷️ TOP HORIZONTAL CATEGORY BAR -->
    <div class="tags-carousel-container" id="tagsCarouselShell">
        <button class="yt-tag-btn active" onclick="filterPlaylistEngine('all')">All Classrooms</button>
        <button class="yt-tag-btn" onclick="filterPlaylistEngine('Mathematics')">Mathematics</button>
        <button class="yt-tag-btn" onclick="filterPlaylistEngine('Science')">Science</button>
        <button class="yt-tag-btn" onclick="filterPlaylistEngine('English')">English</button>
    </div>

    <!-- 📺 MAIN APPLICATION DISPATCH FEED PANEL -->
    <div class="feed-container-stream" id="globalHomeFeedShell">
        <div class="pulse-placeholder">Loading secure FocusTube playlists...</div>
    </div>

    <!-- 🧠 FIREBASE ARCHITECTURE PACKETS -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // 🎯 FIREBASE PROJECT INSTANCE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBUvLFPdm2BmfwfTTYJPM2Cb02OOHPtH9M",
            authDomain: "focustube-72084.firebaseapp.com",
            projectId: "focustube-72084",
            storageBucket: "focustube-72084.firebasestorage.app",
            messagingSenderId: "988104840416",
            appId: "1:988104840416:web:d18dcb90b0c71da53b6c85"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        
        // ⚡ SAFE DEFAULT PLAYLISTS: (अगर फायरबेस खाली हो तो ये कोर्सेज अपने आप चलेंगे)
        // खान सर केमिस्ट्री और डियर सर इंग्लिश प्लेलिस्ट आईडी
        let masterPlaylistsArray = [
            { playlistId: "PL63X9msY7v_fV_kZ4n68Uu9vG9eCshIeE", title: "Class 10 Chemistry Course", subject: "Science" },
            { playlistId: "PLM6bCIsg_SknY8O8Zbe9_uYgscz_TeyM6", title: "Complete English Grammar Masterclass", subject: "English" }
        ];

        // ================= 🏠 FIRESTORE REALTIME SYNC ENGINE =================
        function establishFirestoreSyncNode() {
            // पहले डिफ़ॉल्ट प्लेलिस्ट तुरंत रेंडर कर दो
            renderPlaylistGrid(masterPlaylistsArray);

            auth.onAuthStateChanged((user) => {
                if (user) {
                    currentUser = user;
                    
                    db.collection("pinned_channels")
                        .onSnapshot((snapshot) => {
                            let tempPlaylists = [];
                            snapshot.forEach(doc => {
                                const data = doc.data();
                                // अगर माता-पिता ने 'playlistId' नाम का फील्ड बनाया है
                                if(data.playlistId) {
                                    tempPlaylists.push({
                                        playlistId: data.playlistId,
                                        title: data.title || "Pinned Classroom Course",
                                        subject: data.subject || "General"
                                    });
                                }
                            });
                            
                            if(tempPlaylists.length > 0) {
                                masterPlaylistsArray = tempPlaylists;
                                renderPlaylistGrid(masterPlaylistsArray);
                            }
                        }, err => {
                            console.log("Running on Safe Local Feed Mode.");
                        });
                }
            });
        }

        // ================= 🔀 LAYOUT MATRIX: EMBED PLAYER GRID =================
        function renderPlaylistGrid(playlists) {
            const shell = document.getElementById('globalHomeFeedShell');
            if(!playlists || playlists.length === 0) {
                shell.innerHTML = `<div class="pulse-placeholder">⚠️ No classroom courses pinned yet by parents.</div>`;
                return;
            }

            shell.innerHTML = "";
            let gridHtmlBuffer = `<div class="long-videos-grid">`;

            playlists.forEach(course => {
                const letter = course.subject ? course.subject.charAt(0).toUpperCase() : "C";
                
                // यूट्यूब का ऑफिशियल बिना एपीआई वाला प्लेलिस्ट प्लेयर लिंक
                const playlistEmbedUrl = `https://www.youtube.com/embed/videoseries?list=${course.playlistId}`;

                gridHtmlBuffer += `
                    <div class="yt-video-card">
                        <div class="thumbnail-wrapper">
                            <iframe 
                                src="${playlistEmbedUrl}" 
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                allowfullscreen>
                            </iframe>
                        </div>
                        <div class="video-meta-row">
                            <div class="channel-avatar-mock">${letter}</div>
                            <div class="text-meta-block">
                                <h4 class="video-title-string">${course.title}</h4>
                                <p class="channel-name-string">Subject: ${course.subject}</p>
                            </div>
                        </div>
                    </div>
                `;
            });

            gridHtmlBuffer += `</div>`;
            shell.innerHTML = gridHtmlBuffer;
        }

        // ================= 🏷️ CATEGORY FILTER LOGIC =================
        function filterPlaylistEngine(subjectKeyword) {
            // बटन्स की एक्टिव स्टेट बदलना
            document.querySelectorAll('.yt-tag-btn').forEach(btn => {
                if(btn.innerText.toLowerCase().includes(subjectKeyword.toLowerCase()) || (subjectKeyword === 'all' && btn.innerText.includes('All'))) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            if(subjectKeyword === 'all') {
                renderPlaylistGrid(masterPlaylistsArray);
            } else {
                const filtered = masterPlaylistsArray.filter(p => p.subject.toLowerCase() === subjectKeyword.toLowerCase());
                renderPlaylistGrid(filtered);
            }
        }

        // ================= 📡 PARENT DASHBOARD THEME SYNC SIGNAL =================
        window.addEventListener('message', function(event) {
            const messagePacket = event.data;
            if (messagePacket.type === 'theme') {
                if (messagePacket.mode === 'dark') {
                    document.body.classList.add('dark-mode');
                } else {
                    document.body.classList.remove('dark-mode');
                }
            }
        });

        window.addEventListener('DOMContentLoaded', establishFirestoreSyncNode);
    </script>
</body>
</html>
