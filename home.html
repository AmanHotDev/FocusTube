<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusTube Home Feed 🏠</title>
    <style>
        /* ================= 🎨 YOUTUBE LIGHT THEME (DEFAULT) ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', 'Segoe UI', sans-serif; }
        
        :root {
            --yt-red: #ff0000;
            --bg-home: #ffffff;
            --text-main: #0f0f0f;
            --text-muted: #606060;
            --tag-bg: #f2f2f2;
            --tag-text: #0f0f0f;
            --tag-active-bg: #0f0f0f;
            --tag-active-text: #ffffff;
            --border-color: #e5e5e5;
        }

        /* 🌙 DASHBOARD SYNC: TRUE DARK MODE INTERNAL */
        body.dark-mode {
            --bg-home: #0f0f0f;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --tag-bg: #272727;
            --tag-text: #ffffff;
            --tag-active-bg: #ffffff;
            --tag-active-text: #0f0f0f;
            --border-color: #303030;
        }

        body { background-color: var(--bg-home); color: var(--text-main); transition: background 0.2s, color 0.2s; padding: 12px 24px 40px 24px; overflow-x: hidden; }

        /* 🏷️ YOUTUBE STYLE SCROLLABLE TAGS BAR */
        .tags-carousel-container { display: flex; gap: 12px; overflow-x: auto; padding: 4px 0 16px 0; background: var(--bg-home); position: sticky; top: 0; z-index: 50; scrollbar-width: none; }
        .tags-carousel-container::-webkit-scrollbar { display: none; }
        
        .yt-tag-btn { background: var(--tag-bg); color: var(--tag-text); border: none; padding: 6px 12px; border-radius: 8px; font-size: 0.88rem; font-weight: 500; cursor: pointer; white-space: nowrap; transition: background 0.1s; }
        .yt-tag-btn:hover { background: var(--border-color); }
        .yt-tag-btn.active { background: var(--tag-active-bg); color: var(--tag-active-text); }

        /* ================= 📺 BOLDEST YOUTUBE VIDEO FEED STRUCTURE ================= */
        .feed-container-stream { display: flex; flex-direction: column; gap: 40px; margin-top: 12px; }
        .long-videos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; row-gap: 32px; }
        
        .yt-video-card { display: flex; flex-direction: column; gap: 12px; cursor: pointer; background: transparent; }
        .thumbnail-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
        .yt-video-card:hover .thumbnail-wrapper { border-radius: 0px; }
        .thumbnail-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        
        .video-meta-row { display: flex; gap: 12px; padding: 0 4px; }
        .channel-avatar-mock { width: 36px; height: 36px; border-radius: 50%; background: var(--tag-bg); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; border: 1px solid var(--border-color); }
        
        .text-meta-block { flex: 1; overflow: hidden; }
        .video-title-string { font-size: 0.95rem; font-weight: 600; line-height: 1.4; color: var(--text-main); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
        .channel-name-string { font-size: 0.82rem; color: var(--text-muted); font-weight: 500; }

        .pulse-placeholder { text-align: center; padding: 80px; color: var(--text-muted); font-size: 0.9rem; font-weight: 500; }

        @media (max-width: 480px) {
            .long-videos-grid { grid-template-columns: 1fr; }
            body { padding: 10px 12px; }
        }
    </style>
</head>
<body>

    <!-- 🏷️ TOP HORIZONTAL CATEGORY BAR -->
    <div class="tags-carousel-container" id="tagsCarouselShell">
        <button class="yt-tag-btn active" onclick="filterTagsEngine(this, 'all')">All Classes</button>
    </div>

    <!-- 📺 MAIN APPLICATION DISPATCH FEED PANEL -->
    <div class="feed-container-stream" id="globalHomeFeedShell">
        <div class="pulse-placeholder">Compiling videos from your pinned playlists...</div>
    </div>

    <!-- 🧠 FIREBASE ARCHITECTURE PACKETS -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // 🎯 FIREBASE PROJECT INSTANCE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBUvLFPdm2BmfwfTTYJPM2Cb02OOHPtH9M",
            authDomain: "focustube-72084.firebaseapp.com",
            projectId: "focustube-72084",
            storageBucket: "focustube-72084.firebasestorage.app",
            messagingSenderId: "988104840416",
            appId: "1:988104840416:web:d18dcb90b0c71da53b6c85"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 🔑 1-COST QUOTA LIVE API KEY (सुपर-लो कॉस्ट एंडपॉइंट)
        const YT_GATEWAY_KEY = "AIzaSyD-OjMXfyPMl5QOYj86FwdapQCQeNDrtiQ";
        let currentUser = null;
        
        // 📥 डिफ़ॉल्ट प्लेलिस्ट आईडी (जो आपने दी है - इसे बेस बना दिया है)
        let whitelistedPlaylistsArray = ["PLe8_-h7emkLLkWqQBBKk6b8aLesC6UxMF"]; 
        let compiledVideosMasterList = []; 

        // ================= 🏠 FIRESTORE REALTIME SYNC ENGINE =================
        function establishFirestoreSyncNode() {
            // तुरंत पहली बार डेटा लोड करो बिना फायरबेस के इंतज़ार के
            fetchPlaylistItemsPipeline();

            auth.onAuthStateChanged((user) => {
                if (user) {
                    currentUser = user;
                    
                    db.collection("pinned_channels")
                        .onSnapshot((snapshot) => {
                            let tempArray = [];
                            snapshot.forEach(doc => {
                                // माता-पिता जो भी playlistId एंटर करेंगे, वह यहाँ लाइव कैच होगी
                                if(doc.data().playlistId) tempArray.push(doc.data().playlistId.trim());
                            });
                            
                            if(tempArray.length > 0) {
                                whitelistedPlaylistsArray = tempArray;
                                fetchPlaylistItemsPipeline();
                            }
                        }, err => {
                            console.log("Error loading playlists from firebase.");
                        });
                }
            });
        }

       // ================= 📡 PLAYLIST ITEMS PARSER ENGINE (ALL VIDEOS FETCH LOOP) =================
        async function fetchPlaylistItemsPipeline(searchFilterQuery = "") {
            const shell = document.getElementById('globalHomeFeedShell');
            shell.innerHTML = `<div class="pulse-placeholder">Extracting all videos from live classrooms...</div>`;
            
            compiledVideosMasterList = [];
            let apiPromises = [];
            const uniquePlaylists = [...new Set(whitelistedPlaylistsArray)];

            for (const playlistId of uniquePlaylists) {
                let nextPageToken = "";
                let keepFetching = true;

                // जब तक प्लेलिस्ट के सारे पन्ने (Pages) लोड नहीं हो जाते, यह लूप चलता रहेगा
                while (keepFetching) {
                    let apiUrl = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${playlistId}&key=${YT_GATEWAY_KEY}`;
                    
                    if (nextPageToken) {
                        apiUrl += `&pageToken=${nextPageToken}`;
                    }

                    try {
                        let res = await fetch(apiUrl);
                        let data = await res.json();

                        if (data && data.items) {
                            data.items.forEach(item => {
                                if (searchFilterQuery) {
                                    const title = item.snippet.title.toLowerCase();
                                    if (!title.includes(searchFilterQuery.toLowerCase())) return;
                                }
                                compiledVideosMasterList.push(item);
                            });
                        }

                        // अगर अगला पेज उपलब्ध है, तो टोकन लेकर अगला स्लॉट लोड करो, नहीं तो लूप बंद करो
                        if (data && data.nextPageToken) {
                            nextPageToken = data.nextPageToken;
                        } else {
                            keepFetching = false;
                        }
                    } catch (err) {
                        console.error("🚨 Playlist parsing loop intercepted safety.");
                        keepFetching = false;
                    }
                }
            }
            
            // टैग बटन्स और ग्रिड लेआउट अपडेट करें
            generateDynamicTagsFromMasterList();
            buildRandomizedYoutubeLayout(compiledVideosMasterList);
        }

        // ================= 🏷️ GENERATE DYNAMIC TAGS FROM CONTENT =================
        function generateDynamicTagsFromMasterList() {
            const carousel = document.getElementById('tagsCarouselShell');
            carousel.innerHTML = `<button class="yt-tag-btn active" onclick="filterTagsEngine(this, 'all')">All Classes</button>`;
            
            let channelsSet = new Set();
            compiledVideosMasterList.forEach(video => {
                if(video.snippet.videoOwnerChannelTitle) {
                    channelsSet.add(video.snippet.videoOwnerChannelTitle);
                } else if(video.snippet.channelTitle) {
                    channelsSet.add(video.snippet.channelTitle);
                }
            });

            channelsSet.forEach(channelName => {
                const tagButton = document.createElement('button');
                tagButton.className = 'yt-tag-btn';
                tagButton.innerText = channelName;
                tagButton.onclick = function() { filterTagsEngine(this, channelName); };
                carousel.appendChild(tagButton);
            });
        }

        // ================= 🔀 LAYOUT MATRIX RENDERING ENGINE (CLICK TO PLAY FIXED) =================
        function buildRandomizedYoutubeLayout(items) {
            const shell = document.getElementById('globalHomeFeedShell');
            if(!items || items.length === 0) {
                shell.innerHTML = `<div class="pulse-placeholder">⚠️ No classroom videos found inside your playlists.</div>`;
                return;
            }
            
            shell.innerHTML = ""; 
            let gridHtmlBuffer = `<div class="long-videos-grid">`;

            items.forEach(video => {
                const vidId = video.snippet.resourceId ? video.snippet.resourceId.videoId : "";
                if(!vidId) return;

                // 🎯 यहाँ ध्यान दें: जिस प्लेलिस्ट से वीडियो आ रहा है, उसकी आईडी निकाल रहे हैं
                const playlistId = video.snippet.playlistId || "PLe8_-h7emkLLkWqQBBKk6b8aLesC6UxMF";
                const snip = video.snippet;
                const channelTitle = snip.videoOwnerChannelTitle || snip.channelTitle || "FocusTube Teacher";
                const letter = channelTitle.charAt(0).toUpperCase();
                const thumbnailUrl = snip.thumbnails.medium ? snip.thumbnails.medium.url : `https://img.youtube.com/vi/${vidId}/0.jpg`;

                // 🔥 फिक्स: अलर्ट हटाकर सीधे videoplay.html पर रीडायरेक्ट लिंक सेट कर दिया है
                gridHtmlBuffer += `
                    <div class="yt-video-card" onclick="window.location.href='videoplay.html?v=${vidId}&list=${playlistId}'">
                        <div class="thumbnail-wrapper"><img src="${thumbnailUrl}" alt="Thumbnail"></div>
                        <div class="video-meta-row">
                            <div class="channel-avatar-mock">${letter}</div>
                            <div class="text-meta-block">
                                <h4 class="video-title-string">${snip.title}</h4>
                                <p class="channel-name-string">${channelTitle}</p>
                            </div>
                        </div>
                    </div>
                `;
            });

            gridHtmlBuffer += `</div>`;
            shell.innerHTML = gridHtmlBuffer;
        }
        // ================= 🏷️ TOP CATEGORY TAGS FILTER EXECUTION =================
        function filterTagsEngine(btn, targetKeyword) {
            document.querySelectorAll('.yt-tag-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if(targetKeyword === 'all') {
                buildRandomizedYoutubeLayout(compiledVideosMasterList);
            } else {
                const filtered = compiledVideosMasterList.filter(video => {
                    const cTitle = video.snippet.videoOwnerChannelTitle || video.snippet.channelTitle || "";
                    return cTitle.toLowerCase() === targetKeyword.toLowerCase();
                });
                buildRandomizedYoutubeLayout(filtered);
            }
        }

        // ================= 📡 PARENT DASHBOARD SCRIPT MESSENGER SIGNALS =================
        window.addEventListener('message', function(event) {
            const messagePacket = event.data;
            
            if (messagePacket.type === 'theme') {
                if (messagePacket.mode === 'dark') {
                    document.body.classList.add('dark-mode');
                } else {
                    document.body.classList.remove('dark-mode');
                }
            }
            
            if (messagePacket.type === 'search') {
                fetchPlaylistItemsPipeline(messagePacket.value);
            }
        });

        window.addEventListener('DOMContentLoaded', establishFirestoreSyncNode);
    </script>
</body>
</html>
