<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusTube - Watch History 📜</title>
    <style>
        /* ================= 🎨 MODERN YOUTUBE HISTORY DESIGN SYSTEM ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', 'Segoe UI', sans-serif; }
        
        :root {
            --bg-master: #ffffff;
            --bg-card: #ffffff;
            --text-main: #0f0f0f;
            --text-muted: #606060;
            --border-color: #e5e5e5;
            --yt-blue: #065fd4;
            --hover-bg: #f2f2f2;
            --icon-invert: 0; /* डार्क मोड में 1 होगा */
            --modal-overlay: rgba(0, 0, 0, 0.5);
        }

        body.dark-mode {
            --bg-master: #0f0f0f;
            --bg-card: #1f1f1f;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #303030;
            --hover-bg: #272727;
            --icon-invert: 1; /* यहाँ आइकॉन अपने आप ब्लैक से व्हाइट हो जाएंगे */
            --modal-overlay: rgba(0, 0, 0, 0.8);
        }

        body { background-color: var(--bg-master); color: var(--text-main); transition: background 0.2s, color 0.2s; padding: 24px 40px; min-height: 100vh; }
        
        /* मास्टर टू-कॉलम लेआउट (यूट्यूब ओरिजिनल स्टाइल) */
        .history-main-layout { display: flex; gap: 60px; max-width: 1280px; margin: 0 auto; }
        .history-left-feed { flex: 1; display: flex; flex-direction: column; gap: 32px; }
        .history-right-controls { width: 320px; display: flex; flex-direction: column; gap: 24px; position: sticky; top: 24px; height: fit-content; }

        .page-heading { font-size: 1.6rem; font-weight: 700; margin-bottom: 20px; }
        .date-group-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }

        /* 🔍 SEARCH WATCH HISTORY BAR */
        .history-search-box { display: flex; align-items: center; border-bottom: 1px solid var(--text-main); padding: 6px 0; margin-bottom: 16px; }
        .history-search-box input { background: transparent; border: none; outline: none; color: var(--text-main); font-size: 0.95rem; flex: 1; padding-right: 10px; }
        .history-search-box img { width: 18px; height: 18px; filter: invert(var(--icon-invert)); }

        /* 📺 YOUTUBE LIST-STYLE VIDEO CARD */
        .video-history-list { display: flex; flex-direction: column; gap: 16px; }
        .history-video-card { display: flex; gap: 16px; cursor: pointer; position: relative; padding: 8px; border-radius: 8px; transition: background 0.1s; }
        .history-video-card:hover { background: var(--hover-bg); }

        .thumb-box { width: 200px; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .meta-box { flex: 1; display: flex; flex-direction: column; gap: 4px; padding-right: 30px; }
        .v-title { font-size: 1rem; font-weight: 500; line-height: 1.4; color: var(--text-main); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .v-channel { font-size: 0.82rem; color: var(--text-muted); font-weight: 500; margin-top: 4px; }
        
        /* सिंगल वीडियो डिलीट आइकॉन */
        .delete-single-btn { position: absolute; right: 12px; top: 12px; background: transparent; border: none; cursor: pointer; padding: 4px; border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .delete-single-btn:hover { background: var(--border-color); }
        .delete-single-btn img { width: 14px; height: 14px; filter: invert(var(--icon-invert)); }

        /* 🎛️ RIGHT SIDE CONTROLS INTERFACE */
        .control-action-row { display: flex; align-items: center; gap: 16px; padding: 12px 8px; cursor: pointer; border-radius: 8px; transition: background 0.1s; }
        .control-action-row:hover { background: var(--hover-bg); }
        .control-action-row img { width: 20px; height: 20px; filter: invert(var(--icon-invert)); flex-shrink: 0; }
        .control-text { font-size: 0.92rem; font-weight: 500; }

        /* ✨ EMPTY STATE UI */
        .empty-history-deck { text-align: center; padding: 100px 20px; color: var(--text-muted); font-size: 1rem; display: none; }

        /* 🚨 PREMIUM CUSTOM MODAL DIALOGS STYLE */
        .modal-overlay-gateway { position: fixed; inset: 0; background: var(--modal-overlay); z-index: 99999; display: none; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(2px); }
        .modal-alert-card { background: var(--bg-card); width: 100%; max-width: 380px; border-radius: 12px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); color: var(--text-main); border: 1px solid var(--border-color); }
        .modal-alert-card h3 { font-size: 1.2rem; margin-bottom: 10px; font-weight: 700; }
        .modal-alert-card p { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px; line-height: 1.4; }
        .modal-btn-group { display: flex; justify-content: flex-end; gap: 12px; }
        .modal-btn { padding: 8px 16px; border-radius: 6px; font-size: 0.88rem; font-weight: 600; cursor: pointer; border: none; }
        .modal-btn.cancel { background: transparent; color: var(--text-main); border: 1px solid var(--border-color); }
        .modal-btn.cancel:hover { background: var(--hover-bg); }
        .modal-btn.confirm { background: var(--yt-blue); color: white; }
        .modal-btn.confirm:hover { opacity: 0.9; }

        @media (max-width: 850px) {
            .history-main-layout { flex-direction: column-reverse; gap: 4px; }
            .history-right-controls { width: 100%; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; margin-bottom: 20px; position: static; }
            .thumb-box { width: 140px; }
        }
    </style>
</head>
<body>

    <div class="modal-overlay-gateway" id="customHistoryModalUI">
        <div class="modal-alert-card">
            <h3 id="modalTitleNode">Clear watch history?</h3>
            <p id="modalDescNode">Your whitelisted focus feed history will be cleared from this device node.</p>
            <div class="modal-btn-group">
                <button class="modal-btn cancel" onclick="closeCustomDialogMatrix()">Cancel</button>
                <button class="modal-btn confirm" id="modalConfirmActionTrigger">Clear</button>
            </div>
        </div>
    </div>

    <div class="history-main-layout">
        
        <div class="history-left-feed">
            <h2 class="page-heading">Watch history</h2>
            
            <div id="historyTimelineContainerUI">
                </div>

            <div class="empty-history-deck" id="emptyHistoryPromptUI">
                This list has no videos. Start exploring your courses!
            </div>
        </div>

        <div class="history-right-controls">
            
            <div class="history-search-box">
                <input type="text" id="historySearchInputNode" placeholder="Search watch history" oninput="executeHistorySearch()">
                <img src="icons/path_to_search_icon.png" alt="Search">
            </div>

            <div class="control-action-row" onclick="triggerClearHistoryModal()">
                <img src="icons/clear.png" alt="Clear">
                <span class="control-text">Clear all watch history</span>
            </div>

            <div class="control-action-row" onclick="triggerPauseHistoryModal()">
                <img src="icons/pause.png" id="pauseIconNode" alt="Pause">
                <span class="control-text" id="pauseTextNode">Pause watch history</span>
            </div>

        </div>

    </div>

    <script>
        const HISTORY_STORAGE_KEY = "focustube_watch_history_vector";
        const HISTORY_PAUSE_KEY = "focustube_history_pause_flag";

        let localHistoryArray = [];
        let isHistoryPaused = false;
        let pendingActionCallback = null;

        // ================= 🏠 SYSTEM INITIALIZATION =================
        function initializeHistoryEngine() {
            isHistoryPaused = localStorage.getItem(HISTORY_PAUSE_KEY) === "true";
            updatePauseControlUI();

            localHistoryArray = JSON.parse(localStorage.getItem(HISTORY_STORAGE_KEY)) || [];
            compileAndRenderTimeline(localHistoryArray);
        }

        // ================= 🔀 DATETIME TIMELINE GROUPER ENGINE =================
        function compileAndRenderTimeline(dataList) {
            const container = document.getElementById('historyTimelineContainerUI');
            const emptyPrompt = document.getElementById('emptyHistoryPromptUI');

            if (!dataList || dataList.length === 0) {
                container.innerHTML = "";
                emptyPrompt.style.display = "block";
                return;
            }
            emptyPrompt.style.display = "none";
            container.innerHTML = "";

            let buckets = { today: [], yesterday: [], older: [] };
            const now = new Date();

            dataList.forEach(item => {
                const itemDate = new Date(item.watchedAt);
                const isToday = itemDate.getDate() === now.getDate() && itemDate.getMonth() === now.getMonth() && itemDate.getFullYear() === now.getFullYear();
                
                let yesterday = new Date();
                yesterday.setDate(now.getDate() - 1);
                const isYesterday = itemDate.getDate() === yesterday.getDate() && itemDate.getMonth() === yesterday.getMonth() && itemDate.getFullYear() === yesterday.getFullYear();

                if (isToday) buckets.today.push(item);
                else if (isYesterday) buckets.yesterday.push(item);
                else buckets.older.push(item);
            });

            if (buckets.today.length > 0) renderDateSegmentNode(container, "Today", buckets.today);
            if (buckets.yesterday.length > 0) renderDateSegmentNode(container, "Yesterday", buckets.yesterday);
            if (buckets.older.length > 0) renderDateSegmentNode(container, "Older", buckets.older);
        }

        function renderDateSegmentNode(parent, titleText, items) {
            const segmentWrapper = document.createElement('div');
            segmentWrapper.style.marginBottom = "24px";
            segmentWrapper.innerHTML = `<h3 class="date-group-title">${titleText}</h3>`;
            
            const listContainer = document.createElement('div');
            listContainer.className = "video-history-list";

            items.forEach(v => {
                const card = document.createElement('div');
                card.className = "history-video-card";
                card.onclick = (e) => {
                    if(e.target.closest('button')) return;
                    window.location.href = `videoplay.html?v=${v.videoId}&list=${v.playlistId || ''}`;
                };

                card.innerHTML = `
                    <div class="thumb-box">
                        <img src="https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg" alt="Thumbnail">
                    </div>
                    <div class="meta-box">
                        <h4 class="v-title">${v.title}</h4>
                        <p class="v-channel">${v.channelTitle || 'FocusTube whitelisted lecture'}</p>
                    </div>
                    <button class="delete-single-btn" onclick="triggerSingleDeleteModal('${v.timestampId}')" title="Remove from history">
                        <img src="icons/delete.png" alt="Remove">
                    </button>
                `;
                listContainer.appendChild(card);
            });

            segmentWrapper.appendChild(listContainer);
            parent.appendChild(segmentWrapper);
        }

        // ================= 🔍 LIVE SEARCH OPERATION =================
        function executeHistorySearch() {
            const query = document.getElementById('historySearchInputNode').value.trim().toLowerCase();
            if (!query) {
                compileAndRenderTimeline(localHistoryArray);
                return;
            }
            const filtered = localHistoryArray.filter(v => v.title.toLowerCase().includes(query));
            compileAndRenderTimeline(filtered);
        }

        // ================= 🚨 PREMIUM CUSTOM MODAL TRIGGERS =================
        function openCustomDialogMatrix(title, description, confirmBtnText, callback) {
            document.getElementById('modalTitleNode').innerText = title;
            document.getElementById('modalDescNode').innerText = description;
            
            const confirmBtn = document.getElementById('modalConfirmActionTrigger');
            confirmBtn.innerText = confirmBtnText;
            
            pendingActionCallback = callback;
            document.getElementById('customHistoryModalUI').style.display = "flex";
        }

        function closeCustomDialogMatrix() {
            document.getElementById('customHistoryModalUI').style.display = "none";
            pendingActionCallback = null;
        }

        document.getElementById('modalConfirmActionTrigger').onclick = function() {
            if(pendingActionCallback) pendingActionCallback();
            closeCustomDialogMatrix();
        };

        // ================= 🗑️ MODAL CONTROLS INTEGRATION =================
        function triggerSingleDeleteModal(timestampId) {
            openCustomDialogMatrix(
                "Remove from watch history?",
                "This video lecture log will be deleted from your active timeline metrics.",
                "Remove",
                () => {
                    localHistoryArray = localHistoryArray.filter(v => v.timestampId !== timestampId);
                    localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(localHistoryArray));
                    compileAndRenderTimeline(localHistoryArray);
                }
            );
        }

        function triggerClearHistoryModal() {
            openCustomDialogMatrix(
                "Clear watch history?",
                "Are you sure you want to completely wipe out your whitelisted classroom history? This action cannot be undone.",
                "Clear History",
                () => {
                    localHistoryArray = [];
                    localStorage.removeItem(HISTORY_STORAGE_KEY);
                    compileAndRenderTimeline(localHistoryArray);
                }
            );
        }

        function triggerPauseHistoryModal() {
            const title = isHistoryPaused ? "Turn on watch history?" : "Pause watch history?";
            const desc = isHistoryPaused 
                ? "FocusTube will resume saving your classroom video tracks to build your revision logs."
                : "Pausing watch history will temporarily halt saving your lecture timeline streams. Pinned playlists remain unaffected.";
            const btnText = isHistoryPaused ? "Turn On" : "Pause";

            openCustomDialogMatrix(title, desc, btnText, () => {
                isHistoryPaused = !isHistoryPaused;
                localStorage.setItem(HISTORY_PAUSE_KEY, isHistoryPaused);
                updatePauseControlUI();
            });
        }

        // 🎯 जादुई नोड: बंद होने पर icons/on.png और चालू होने पर pause.png लोड करेगा
        function updatePauseControlUI() {
            const textNode = document.getElementById('pauseTextNode');
            const iconNode = document.getElementById('pauseIconNode');
            
            if(isHistoryPaused) {
                textNode.innerText = "Turn on watch history";
                iconNode.src = "icons/on.png"; 
            } else {
                textNode.innerText = "Pause watch history";
                iconNode.src = "icons/pause.png";
            }
        }

        // ================= 📡 PARENT DASHBOARD THEME SIGNAL RECEIVER =================
        window.addEventListener('message', function(event) {
            const messagePacket = event.data;
            if (messagePacket.type === 'theme') {
                if (messagePacket.mode === 'dark') document.body.classList.add('dark-mode');
                else document.body.classList.remove('dark-mode');
            }
        });

        window.addEventListener('DOMContentLoaded', initializeHistoryEngine);
    </script>
</body>
</html>
